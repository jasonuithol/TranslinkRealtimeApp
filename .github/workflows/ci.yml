name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: build & smoke test
    runs-on: ubuntu-latest   # Docker is preinstalled, so the image build works out of the box

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Syntax check
        run: python -m compileall -q app.py ingest_gtfs.py

      - name: Build the image
        run: docker build -t translink:ci -f Containerfile .

      # There is no unit-test suite in this repo (the original tests were written
      # in claude.ai and not preserved), so the gate is an end-to-end smoke test
      # against mock_gtfs.zip: ingest, serve, query. It exercises the same image
      # that publish-image ships.
      - name: Ingest the mock feed
        run: |
          docker volume create ci-data
          docker run --rm -v ci-data:/data \
            -v "$PWD/mock_gtfs.zip:/tmp/mock.zip:ro" \
            translink:ci python ingest_gtfs.py /tmp/mock.zip

      - name: Re-ingest, to prove the atomic swap works over an existing DB
        run: |
          docker run --rm -v ci-data:/data \
            -v "$PWD/mock_gtfs.zip:/tmp/mock.zip:ro" \
            translink:ci python ingest_gtfs.py /tmp/mock.zip
          # A leftover .tmp means os.replace() did not land.
          docker run --rm -v ci-data:/data translink:ci \
            sh -c 'test ! -e /data/gtfs.sqlite3.tmp' \
            || { echo "gtfs.sqlite3.tmp left behind"; exit 1; }

      - name: Start the board
        run: |
          docker run -d --name translink-ci -p 8000:8000 -v ci-data:/data translink:ci
          for _ in $(seq 1 30); do
            curl -fsS -o /dev/null http://localhost:8000/ && exit 0
            sleep 1
          done
          echo "server did not come up:"; docker logs translink-ci; exit 1

      - name: Query the API
        run: |
          # Parent-station expansion: 'Central station' is location_type=1 in the
          # mock feed and must come back from search without its child platforms.
          search=$(curl -fsS "http://localhost:8000/api/stops/search?q=Central")
          echo "$search"
          echo "$search" | grep -q '"stop_id":"place_censta"' \
            || { echo "expected Central station in search results"; exit 1; }
          echo "$search" | grep -q '"is_station":true' \
            || { echo "expected Central station flagged as a station"; exit 1; }
          # Search results carry the stop's dominant mode, for the row icon.
          echo "$search" | grep -q '"route_type"' \
            || { echo "expected route_type on search results"; exit 1; }

          # Regions carry their state — the landing page's cross-region search
          # labels every result row with it (QLD/VIC).
          curl -fsS "http://localhost:8000/api/regions" | grep -q '"state":"QLD"' \
            || { echo "expected state on /api/regions"; exit 1; }

          # Departures for the parent station: the mock timetable is fixed in the
          # past, so assert the response shape rather than a non-empty board.
          deps=$(curl -fsS "http://localhost:8000/api/departures/place_censta")
          echo "$deps"
          echo "$deps" | grep -q '"departures"' \
            || { echo "malformed departures response"; exit 1; }

          # No -f here: it would make curl exit non-zero on the 404 we want.
          curl -sS -o /dev/null -w '%{http_code}\n' \
            "http://localhost:8000/api/departures/nonexistent" | grep -q 404 \
            || { echo "expected 404 for an unknown stop_id"; exit 1; }

          # The map rides along on the departures response: live GPS vehicles
          # and timetable-estimated ghosts for the trips without any.
          echo "$deps" | grep -q '"vehicles"' \
            || { echo "departures response missing the vehicles array"; exit 1; }
          echo "$deps" | grep -q '"ghosts"' \
            || { echo "departures response missing the ghosts array"; exit 1; }

          # No basemap is built in CI, so the frontend must be told to hide the
          # map rather than fail. This is the degradation path on a fresh volume.
          curl -fsS http://localhost:8000/api/config | grep -q '"basemap":false' \
            || { echo "expected basemap:false with no basemap on the volume"; exit 1; }

          # Train stations for the always-on map landmarks.
          curl -fsS http://localhost:8000/api/rail-stations | grep -q '"stations"' \
            || { echo "rail-stations response missing the stations array"; exit 1; }

          # Disruption alerts ride along too (an empty map before the first
          # alert poll, but the key must exist).
          deps2=$(curl -fsS "http://localhost:8000/api/departures/place_censta")
          echo "$deps2" | grep -q '"alerts"' \
            || { echo "departures response missing the alerts map"; exit 1; }

          # Region scoping: the same data must be reachable under /api/r/seq/…
          # (the frontend's only path family) and /api/regions must list seq.
          curl -fsS "http://localhost:8000/api/regions" | grep -q '"seq"' \
            || { echo "regions endpoint missing seq"; exit 1; }
          curl -fsS "http://localhost:8000/api/r/seq/departures/place_censta" \
            | grep -q '"departures"' \
            || { echo "region-scoped departures path broken"; exit 1; }
          curl -sS -o /dev/null -w '%{http_code}\n' \
            "http://localhost:8000/api/r/nowhere/config" | grep -q 404 \
            || { echo "expected 404 for an unknown region"; exit 1; }

      - name: Extended route types normalise to the basic GTFS set
        run: |
          # PTV (Melbourne) publishes Google extended route types; the whole app
          # keys on basic 0-4, so the ingest collapses them. 400=metro rail -> 1,
          # 701=bus -> 3, 900s=tram -> 0; basic values pass through untouched.
          docker run --rm translink:ci python -c "
          from ingest_gtfs import normalize_route_type as n
          assert n('400') == '1' and n('701') == '3' and n('900') == '0'
          assert n('101') == '2' and n('1000') == '4'
          assert n('2') == '2' and n('0') == '0' and n('') == '' and n(None) is None
          print('route type normalisation correct')
          "

      - name: Scheduled times resolve in Brisbane time, not the host's
        run: |
          # Regression test. gtfs_time_to_epoch used a naive datetime, so a UTC
          # container read every scheduled time 10 hours late and surfaced
          # after-midnight (24:xx) services as if they were departing now.
          # Forcing TZ=UTC here reproduces the container case exactly.
          docker run --rm -e TZ=UTC -v ci-data:/data translink:ci python -c "
          import datetime, zoneinfo, app
          bne = zoneinfo.ZoneInfo('Australia/Brisbane')
          day = datetime.datetime(2026, 7, 21, 12, 0, tzinfo=bne)
          got = datetime.datetime.fromtimestamp(app.gtfs_time_to_epoch('10:16:00', day), bne)
          assert (got.hour, got.minute) == (10, 16), f'10:16 resolved to {got}'
          # 24:xx is the *next* morning under the same service date.
          got = datetime.datetime.fromtimestamp(app.gtfs_time_to_epoch('24:28:00', day), bne)
          assert (got.day, got.hour, got.minute) == (22, 0, 28), f'24:28 resolved to {got}'
          print('scheduled times resolve correctly under TZ=UTC')
          "

      - name: Estimated (ghost) positions interpolate along the timetable
        run: |
          # Regression test for the schedule-based dead reckoning that places a
          # marker for trips with no live GPS. Exercises the pure geometry so it
          # does not depend on the mock feed's timing.
          docker run --rm -v ci-data:/data translink:ci python -c "
          import app
          # Two stops 0.1 deg apart in longitude, 1000s apart in time.
          nodes = [(1000, -27.0, 153.0), (2000, -27.0, 153.1)]
          mid = app._interpolate_along(nodes, 1500)
          assert abs(mid['lon'] - 153.05) < 1e-9 and abs(mid['lat'] + 27.0) < 1e-9, mid
          # At the origin departure time: on the road, drawn at the origin.
          assert app._interpolate_along(nodes, 1000) == {'lat': -27.0, 'lon': 153.0}
          # Before it departs, with no staging window: no position (no phantom
          # bus parked at the route start).
          assert app._interpolate_along(nodes, 500) is None
          # Staging window: within it, a not-yet-departed trip shows at origin...
          assert app._interpolate_along(nodes, 500, 600) == {'lat': -27.0, 'lon': 153.0}
          # ...but outside it (leaves in 700s > 600s window), still nothing.
          assert app._interpolate_along(nodes, 300, 600) is None
          # After the last stop: the trip has finished, so no position.
          assert app._interpolate_along(nodes, 3000) is None
          assert app._interpolate_along(nodes, 3000, 600) is None
          # Anchoring by seconds-into-day stays monotonic across 24:00.
          assert app._seconds_into_day('24:28:00') == 88080
          print('ghost interpolation: midpoint, origin-clamp and end-of-trip all correct')
          "

      - name: No duplicated trips on the board
        run: |
          # Regression test: both service dates are queried, and an absolute
          # realtime arrival used to overwrite both copies of a trip, so the
          # stale one survived the window filter and the row appeared twice.
          curl -fsS "http://localhost:8000/api/departures/place_censta" \
            | python3 -c "
          import json, sys, collections
          deps = json.load(sys.stdin)['departures']
          dup = [t for t, n in collections.Counter(d['trip_id'] for d in deps).items() if n > 1]
          assert not dup, f'duplicated trip_ids on the board: {dup}'
          print(f'{len(deps)} departures, no duplicates')
          "

      - name: Map style references real vector layers
        run: |
          # Regression test. A style referencing a source-layer the basemap does
          # not ship renders blank: MapLibre reports it on its own error channel,
          # then never fires 'load', so every layer added in the load handler
          # silently never exists — no console error, no failed request.
          python3 - <<'PY'
          import json, sys
          # The vector layers the OpenMapTiles basemap ships (planetiler, read
          # from `pmtiles show --metadata`). The basemap is self-built by
          # basemap/build-basemap.sh.
          PRESENT = {"aerodrome_label", "aeroway", "boundary", "building",
                     "housenumber", "landcover", "landuse", "mountain_peak",
                     "park", "place", "poi", "transportation",
                     "transportation_name", "water", "water_name", "waterway"}
          style = json.load(open("static/map-style.json"))
          bad = [(l["id"], l["source-layer"]) for l in style["layers"]
                 if l.get("source-layer") and l["source-layer"] not in PRESENT]
          for lid, sl in bad:
              print(f"layer {lid!r} references missing source-layer {sl!r}")
          sys.exit(1 if bad else 0)
          PY

      - name: Frontend assets are self-hosted
        run: |
          # The board must make no external requests: fonts, map JS and glyphs
          # are all vendored. A stray CDN link would break offline/air-gapped use.
          if grep -nE "https?://(fonts\.googleapis|fonts\.gstatic|unpkg|cdn\.|.*\.jsdelivr)" static/index.html; then
            echo "external asset reference found in index.html"; exit 1
          fi
          for A in /static/vendor/maplibre-gl.js /static/vendor/pmtiles.js \
                   /static/map-style.json /static/fonts/fonts.css; do
            curl -fsS -o /dev/null "http://localhost:8000$A" \
              || { echo "missing vendored asset: $A"; exit 1; }
          done

      - name: Container logs
        if: always()
        run: docker logs translink-ci || true

  # Build the runtime image once, from the exact tree that passed the smoke test, and push
  # it to GHCR. The VPS pulls this image instead of rebuilding — see deploy/install-vps.sh.
  # Only runs on pushes to main (a fork PR can't push packages, and untested images shouldn't ship).
  publish-image:
    name: publish image
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Containerfile
          push: true
          # image names must be lowercase; the repo is TranslinkRealtimeApp, so it's hardcoded here
          tags: |
            ghcr.io/jasonuithol/translink-departures:latest
            ghcr.io/jasonuithol/translink-departures:${{ github.sha }}
