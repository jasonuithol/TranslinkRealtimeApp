<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Service</title>
<link href="/static/fonts/fonts.css" rel="stylesheet">
<link href="/static/vendor/maplibre-gl.css" rel="stylesheet">
<style>
  :root {
    --board: #101418;        /* board casing */
    --panel: #171d23;        /* row panel */
    --line:  #232c34;
    --amber: #ffb400;        /* LED amber, the busway PID colour */
    --amber-dim: #7a5a10;
    --text:  #e8edf1;
    --muted: #8fa0ad;
    --live:  #35d07f;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--board);
    color: var(--text);
    font-family: "Archivo", system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px 48px;
  }
  /* Narrow by default (board only). Widens once the map is alongside. */
  main { width: 100%; max-width: 620px; }
  main.wide { max-width: 1180px; }

  header { margin-bottom: 20px; }
  .eyebrow {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  h1 { font-size: 22px; font-weight: 700; line-height: 1.25; }

  .search { position: relative; margin-bottom: 22px; }
  .search input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font: inherit;
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
  }
  .search input:focus { border-color: var(--amber-dim); }
  .search-results {
    position: absolute; inset-inline: 0; top: calc(100% + 4px);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    max-height: 260px; overflow-y: auto;
    z-index: 10;
  }
  .search-results button {
    display: block; width: 100%; text-align: left;
    background: none; border: 0; color: var(--text);
    font: inherit; font-size: 14px;
    padding: 10px 14px; cursor: pointer;
  }
  .search-results button:hover, .search-results button:focus-visible {
    background: #1f2731; outline: none;
  }
  .search-results .sid {
    font-family: "IBM Plex Mono", monospace;
    color: var(--muted); font-size: 12px; margin-left: 6px;
  }

  .board {
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
  }
  .row {
    display: grid;
    grid-template-columns: 82px 1fr 96px;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--panel);
    border-top: 1px solid var(--line);
  }
  .row:first-child { border-top: 0; }

  /* Split badge: mode glyph | route number. Black plate, white border and
     divider; the glyph and the number both inherit the vehicle colour via
     `color`, so the badge matches the row stripe and the map marker. */
  .badge {
    justify-self: start;
    display: inline-flex;
    align-items: stretch;
    background: #000;
    border: 1px solid #fff;
    border-radius: 6px;
    overflow: hidden;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .badge .mode {
    display: flex; align-items: center; justify-content: center;
    padding: 4px 6px;
    border-right: 1px solid #fff;
  }
  .badge .mode svg { width: 16px; height: 16px; display: block; }
  .badge .num {
    display: flex; align-items: center; justify-content: center;
    padding: 4px 7px; font-size: 15px; min-width: 32px;
  }
  .badge .num.wide { font-size: 10px; line-height: 1.15; padding: 4px 5px; }
  .dest { min-width: 0; }
  .dest .headsign {
    font-size: 15px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .dest .sub {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; color: var(--muted); margin-top: 3px;
    display: flex; align-items: center; gap: 6px;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--live);
    animation: pulse 2s infinite;
  }
  /* A tracked service is tinted with its own colour, matching its map marker.
     The left stripe carries the colour at row scale; the dot ties it to the
     "live" label. Untracked rows keep the plain green dot. */
  .row.tracked { border-left: 3px solid var(--vcolor); padding-left: 13px; }
  .row.tracked .live-dot { background: var(--vcolor); }
  @keyframes pulse { 50% { opacity: 0.25; } }
  @media (prefers-reduced-motion: reduce) {
    .live-dot, .due { animation: none !important; }
  }

  .eta {
    font-family: "IBM Plex Mono", monospace;
    text-align: right;
    color: var(--amber);
    text-shadow: 0 0 12px rgba(255, 180, 0, 0.35);
  }
  .eta .num { font-size: 30px; font-weight: 600; line-height: 1; }
  .eta .unit { font-size: 11px; color: var(--amber-dim); letter-spacing: 0.1em; }
  .eta .due {
    font-size: 22px; font-weight: 600; letter-spacing: 0.06em;
    animation: pulse 1.2s infinite;
  }

  .status {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; color: var(--muted);
    margin-top: 12px; text-align: right;
  }
  .empty, .error {
    padding: 32px 16px; text-align: center;
    color: var(--muted); font-size: 14px;
    background: var(--panel);
  }
  .error { color: #ff8a7a; }

  /* --- board + map layout ------------------------------------------------ */
  /* Stacked by default; side by side only when there is room AND a map. The
     board keeps its natural width and the map takes the remaining space. */
  .split { display: grid; grid-template-columns: minmax(0, 1fr); gap: 18px; }
  @media (min-width: 900px) {
    .split.side-by-side {
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      align-items: start;
    }
    .split.side-by-side #map { height: 100%; min-height: 520px; }
    /* The map column is sticky so it stays visible against a long board. */
    .split.side-by-side #map-wrap { position: sticky; top: 24px; }
  }

  /* --- map view ---------------------------------------------------------- */
  #map-wrap[hidden] { display: none; }
  #map {
    height: 360px; border-radius: 10px; overflow: hidden;
    background: #0c1013; border: 1px solid #232c35;
  }
  .map-caption {
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 12px; padding: 8px 2px 0; color: var(--muted); font-size: 13px;
  }
  .map-caption .hint { font-family: "IBM Plex Mono", monospace; font-size: 11px; }
  /* MapLibre's own chrome, toned down to match the board */
  .maplibregl-ctrl-attrib { background: rgba(12,16,19,.8) !important; }
  .maplibregl-ctrl-attrib a { color: #7f8c99 !important; }
  .maplibregl-popup-content {
    background: var(--panel); color: var(--text);
    font-family: Archivo, system-ui, sans-serif; font-size: 13px;
    border-radius: 8px; padding: 8px 10px; border: 1px solid #2b3742;
  }
  .maplibregl-popup-content .pop-route { font-weight: 700; }
  .maplibregl-popup-content .pop-sub {
    color: var(--muted); font-size: 11px;
    font-family: "IBM Plex Mono", monospace;
  }
  .maplibregl-popup-tip { border-top-color: var(--panel) !important; }
</style>
</head>
<body>
<main>
  <header>
    <div class="eyebrow">Translink · South East Queensland</div>
    <h1 id="stop-name">Next service</h1>
  </header>

  <div class="search">
    <input id="search" type="search" placeholder="Search for a stop, e.g. Cultural Centre"
           autocomplete="off" aria-label="Search for a stop">
    <div class="search-results" id="results" hidden></div>
  </div>

  <div class="split" id="split">
    <div class="board" id="board">
      <div class="empty">Search for a stop to see departures.</div>
    </div>
    <div id="map-wrap" hidden>
      <div id="map"></div>
      <div class="map-caption">
        <span id="map-status">live vehicle positions</span>
        <span class="hint">tap a vehicle for detail</span>
      </div>
    </div>
  </div>

  <div class="status" id="status"></div>
</main>

<script src="/static/vendor/maplibre-gl.js"></script>
<script src="/static/vendor/pmtiles.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  let stopId = new URLSearchParams(location.search).get("stop");
  let timer = null;

  // --- stop search -------------------------------------------------------
  let searchDebounce;
  $("search").addEventListener("input", (e) => {
    clearTimeout(searchDebounce);
    const q = e.target.value.trim();
    if (q.length < 3) { $("results").hidden = true; return; }
    searchDebounce = setTimeout(async () => {
      const res = await fetch(`/api/stops/search?q=${encodeURIComponent(q)}`);
      const stops = await res.json();
      const box = $("results");
      box.innerHTML = "";
      stops.forEach((s) => {
        const b = document.createElement("button");
        b.innerHTML = `${s.stop_name}<span class="sid">${s.is_station ? "station · " : ""}${s.stop_id}</span>`;
        b.onclick = () => selectStop(s.stop_id);
        box.appendChild(b);
      });
      box.hidden = stops.length === 0;
    }, 250);
  });

  function selectStop(id) {
    stopId = id;
    centred = false;          // re-centre the map on the newly chosen stop
    $("results").hidden = true;
    $("search").value = "";
    history.replaceState(null, "", `?stop=${id}`);
    refresh();
    clearInterval(timer);
    timer = setInterval(refresh, 15000);
  }

  // --- map ---------------------------------------------------------------
  // The basemap is a self-hosted Protomaps extract on the data volume. If the
  // deployment has no basemap, /api/config says so and the map stays hidden —
  // the board is the product, the map is an enhancement.
  let map = null, mapReady = false, hasBasemap = false, centred = false;

  // Distinct on a dark board, and enough of them that a full board of tracked
  // services gets a unique colour each. Route colour is not usable here: the
  // whole point is telling apart several vehicles on the *same* route.
  const VEHICLE_COLORS = [
    "#4ea1ff", "#ffb020", "#3fb950", "#ff6b9d", "#a78bfa", "#22d3ee", "#f97316",
    "#84cc16", "#f472b6", "#38bdf8", "#fbbf24", "#2dd4bf", "#c084fc", "#fb7185",
  ];

  // Mode glyphs. Inline SVG rather than emoji: colour-emoji fonts paint their
  // own palette and ignore CSS `color`, so an emoji cannot take the vehicle
  // colour. Cut-outs are filled #000 to match the badge plate.
  const ICON_BUS = `<svg viewBox="0 0 24 24" aria-hidden="true">
    <rect x="3" y="3" width="18" height="14" rx="2.5" fill="currentColor"/>
    <rect x="5" y="5.5" width="6" height="4.5" rx="1" fill="#000"/>
    <rect x="13" y="5.5" width="6" height="4.5" rx="1" fill="#000"/>
    <circle cx="7.5" cy="19" r="2" fill="currentColor"/>
    <circle cx="16.5" cy="19" r="2" fill="currentColor"/></svg>`;
  const ICON_TRAIN = `<svg viewBox="0 0 24 24" aria-hidden="true">
    <rect x="4" y="2.5" width="16" height="15" rx="3.5" fill="currentColor"/>
    <rect x="6" y="5" width="12" height="5" rx="1" fill="#000"/>
    <circle cx="8.5" cy="13.5" r="1.3" fill="#000"/>
    <circle cx="15.5" cy="13.5" r="1.3" fill="#000"/>
    <path d="M8 18l-2.5 3M16 18l2.5 3" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" fill="none"/></svg>`;
  const ICON_FERRY = `<svg viewBox="0 0 24 24" aria-hidden="true">
    <rect x="8" y="3" width="8" height="6" rx="1" fill="currentColor"/>
    <path d="M2.5 11h19l-2.6 6.4A2.5 2.5 0 0 1 16.6 19H7.4a2.5 2.5 0 0 1-2.3-1.6L2.5 11z"
          fill="currentColor"/></svg>`;
  const ICON_TRAM = `<svg viewBox="0 0 24 24" aria-hidden="true">
    <path d="M12 1v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    <rect x="5" y="4" width="14" height="14" rx="3" fill="currentColor"/>
    <rect x="7" y="6.5" width="10" height="4.5" rx="1" fill="#000"/>
    <circle cx="9" cy="14.5" r="1.2" fill="#000"/>
    <circle cx="15" cy="14.5" r="1.2" fill="#000"/>
    <path d="M8 19l-2 2M16 19l2 2" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" fill="none"/></svg>`;
  // GTFS route_type: 0 tram, 1 metro, 2 rail, 3 bus, 4 ferry.
  const MODE_ICON = {
    0: ICON_TRAM, 1: ICON_TRAIN, 2: ICON_TRAIN, 3: ICON_BUS, 4: ICON_FERRY,
  };

  const hashStr = (s) => {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
    return Math.abs(h);
  };

  // Seed each colour from the trip_id so a vehicle keeps it across refreshes,
  // but resolve collisions so no two vehicles on screen ever share one.
  function assignColors(vehicles) {
    const used = new Set(), out = {};
    vehicles.forEach((v) => {
      let i = hashStr(v.trip_id) % VEHICLE_COLORS.length, tries = 0;
      while (used.has(i) && tries++ < VEHICLE_COLORS.length) {
        i = (i + 1) % VEHICLE_COLORS.length;
      }
      used.add(i);
      out[v.trip_id] = VEHICLE_COLORS[i];
    });
    return out;
  }

  async function initMap() {
    try {
      const cfg = await (await fetch("/api/config")).json();
      hasBasemap = !!cfg.basemap;
    } catch { hasBasemap = false; }
    if (!hasBasemap) return;

    // Reveal before constructing the Map: MapLibre measures its container at
    // construction, and a display:none container gives it zero size — the map
    // then never fires 'load' and paints nothing.
    $("map-wrap").hidden = false;
    // Only go two-column once there is actually a map to put in the second one.
    $("split").classList.add("side-by-side");
    document.querySelector("main").classList.add("wide");

    // {metadata: true} is required: the style's source uses `url:`, so MapLibre
    // asks the protocol for TileJSON. Without this flag pmtiles ignores that
    // request — the promise never settles, and the style hangs with no error.
    maplibregl.addProtocol("pmtiles", new pmtiles.Protocol({ metadata: true }).tile);
    map = new maplibregl.Map({
      container: "map",
      style: "/static/map-style.json",
      center: [153.026, -27.4705],   // Brisbane, until a stop is selected
      zoom: 11,
      attributionControl: { compact: true },
      // The board is often on a wall display; don't let a stray scroll move it.
      scrollZoom: false,
    });
    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), "top-right");

    map.on("load", () => {
      map.addSource("vehicles", { type: "geojson", data: emptyFC() });
      map.addSource("stop", { type: "geojson", data: emptyFC() });

      map.addLayer({
        id: "stop-ring", type: "circle", source: "stop",
        paint: {
          "circle-radius": 7, "circle-color": "#0c1013",
          "circle-stroke-width": 2.5, "circle-stroke-color": "#ffb020",
        },
      });
      map.addLayer({
        id: "vehicle-dot", type: "circle", source: "vehicles",
        paint: {
          "circle-radius": ["interpolate", ["linear"], ["zoom"], 10, 6, 15, 10],
          // Same colour the matching board row is striped with.
          "circle-color": ["coalesce", ["get", "color"], "#3fb950"],
          "circle-stroke-width": 2, "circle-stroke-color": "#0c1013",
        },
      });
      map.addLayer({
        id: "vehicle-label", type: "symbol", source: "vehicles",
        layout: {
          // Minutes-away is what ties a dot to its row at a glance; the route
          // number is often identical across several vehicles here.
          "text-field": ["concat", ["get", "minutes"], " min"],
          "text-font": ["Noto Sans Medium"],
          "text-size": 11,
          "text-offset": [0, 1.4],
          "text-allow-overlap": false,
        },
        paint: {
          "text-color": ["coalesce", ["get", "color"], "#c9d4de"],
          "text-halo-color": "#0c1013", "text-halo-width": 1.4,
        },
      });

      map.on("click", "vehicle-dot", (e) => {
        const p = e.features[0].properties;
        new maplibregl.Popup({ closeButton: false, offset: 12 })
          .setLngLat(e.features[0].geometry.coordinates)
          .setHTML(
            `<div class="pop-route">${p.route ?? ""} · ${p.headsign ?? ""}</div>` +
            `<div class="pop-sub">${p.minutes} min away${p.age ? " · seen " + p.age + "s ago" : ""}</div>`)
          .addTo(map);
      });
      map.on("mouseenter", "vehicle-dot", () => map.getCanvas().style.cursor = "pointer");
      map.on("mouseleave", "vehicle-dot", () => map.getCanvas().style.cursor = "");

      mapReady = true;
      map.resize();
      if (lastData) updateMap(lastData);
    });
  }

  const emptyFC = () => ({ type: "FeatureCollection", features: [] });

  function updateMap(data) {
    if (!mapReady) return;
    const lat = data.stop.stop_lat, lon = data.stop.stop_lon;

    if (lat != null && lon != null) {
      map.getSource("stop").setData({
        type: "FeatureCollection",
        features: [{ type: "Feature", geometry: { type: "Point", coordinates: [lon, lat] }, properties: {} }],
      });
      // Centre once per stop selection, then leave the user's panning alone.
      if (!centred) { map.jumpTo({ center: [lon, lat], zoom: 13 }); centred = true; }
    }

    const now = Math.floor(Date.now() / 1000);
    const colors = data.__colors || {};
    // __vehicles is the set trimmed to the rows actually on screen.
    const vehicles = data.__vehicles || data.vehicles || [];
    map.getSource("vehicles").setData({
      type: "FeatureCollection",
      features: vehicles.map((v) => ({
        type: "Feature",
        geometry: { type: "Point", coordinates: [v.lon, v.lat] },
        properties: {
          route: v.route ?? "",
          headsign: v.headsign ?? "",
          minutes: v.minutes,
          color: colors[v.trip_id] || "#3fb950",
          age: v.timestamp ? now - v.timestamp : null,
        },
      })),
    });

    const shownCount = data.departures.length - (data.__hidden || 0);
    $("map-status").textContent = vehicles.length === 0
      ? "no live positions for these services"
      : `${vehicles.length} of ${shownCount} services tracking live`;
  }

  // --- departures board --------------------------------------------------
  let lastData = null;

  // How many rows fit between the top of the board and the bottom of the
  // viewport. Null until a row has been measured — the first render draws
  // everything, measures, then redraws trimmed.
  let rowHeight = null;

  function fittingRowCount() {
    if (!rowHeight) return null;
    const top = $("board").getBoundingClientRect().top;
    const avail = window.innerHeight - top - BOARD_BOTTOM_GUTTER;
    return Math.max(1, Math.floor(avail / rowHeight));
  }
  const BOARD_BOTTOM_GUTTER = 28;   // breathing room + the status line

  function renderBoard(data) {
    $("stop-name").textContent = data.stop.stop_name;
    const board = $("board");
    board.innerHTML = "";
    if (data.departures.length === 0) {
      board.innerHTML = `<div class="empty">No services in the next 90 minutes.</div>`;
    }

    // Show only what fits, and cut the map to match: a marker with no row on
    // screen is exactly the mismatch the vehicles array exists to prevent.
    const limit = fittingRowCount();
    const shown = limit ? data.departures.slice(0, limit) : data.departures;
    const shownIds = new Set(shown.map((d) => d.trip_id));
    const vehicles = (data.vehicles || []).filter((v) => shownIds.has(v.trip_id));

    // One colour per tracked vehicle, shared by the row stripe and the map
    // marker so the two views can be matched by eye.
    const colors = assignColors(vehicles);
    data.__colors = colors;
    data.__vehicles = vehicles;
    data.__hidden = data.departures.length - shown.length;

      const MODES = { 0: "Tram", 1: "Metro", 2: "Train", 3: "Bus", 4: "Ferry" };
      shown.forEach((d) => {
        const row = document.createElement("div");
        const vcolor = colors[d.trip_id];
        row.className = vcolor ? "row tracked" : "row";
        if (vcolor) row.style.setProperty("--vcolor", vcolor);
        // The badge plate stays black; the glyph and number take the vehicle
        // colour, so badge, row stripe and map marker all agree. Untracked
        // services fall back to the route's own colour from the feed.
        const badgeInk = vcolor || (d.route_color ? `#${d.route_color}` : null);
        const badgeStyle = badgeInk ? `style="color:${badgeInk}"` : "";
        const routeLabel = d.route ?? "";
        const numClass = routeLabel.length > 4 ? "num wide" : "num";
        const icon = MODE_ICON[d.route_type] ?? ICON_BUS;
        const eta = d.minutes <= 0
          ? `<div class="due">DUE</div>`
          : `<div class="num">${d.minutes}</div><div class="unit">MIN</div>`;
        const bits = [MODES[d.route_type] ?? ""];
        if (d.platform) bits.push(`Plat ${d.platform}`);
        bits.push(new Date(d.predicted * 1000)
          .toLocaleTimeString([], {hour: "2-digit", minute: "2-digit"}));
        row.innerHTML = `
          <div class="badge" ${badgeStyle}>
            <span class="mode">${icon}</span>
            <span class="${numClass}">${routeLabel}</span>
          </div>
          <div class="dest">
            <div class="headsign">${d.headsign ?? ""}</div>
            <div class="sub">
              ${d.realtime ? '<span class="live-dot"></span>live' : "scheduled"}
              · ${bits.filter(Boolean).join(" · ")}
            </div>
          </div>
          <div class="eta">${eta}</div>`;
        board.appendChild(row);
      });

    // Measure once from a real row, then redraw now that the count is known.
    if (!rowHeight) {
      const first = board.querySelector(".row");
      if (first) {
        rowHeight = first.getBoundingClientRect().height;
        renderBoard(data);
        return;
      }
    }

    const age = data.realtime_feed_age;
    const feed = age === null
      ? "realtime feed: waiting for first fetch"
      : `realtime feed updated ${age}s ago`;
    $("status").textContent = data.__hidden > 0
      ? `${feed} · ${data.__hidden} more not shown`
      : feed;
  }

  async function refresh() {
    if (!stopId) return;
    try {
      const res = await fetch(`/api/departures/${stopId}`);
      if (!res.ok) throw new Error((await res.json()).detail || res.status);
      const data = await res.json();
      renderBoard(data);
      lastData = data;
      updateMap(data);
    } catch (err) {
      $("board").innerHTML = `<div class="error">${err.message}</div>`;
    }
  }

  // Re-fit the board when the viewport changes; the row count is derived from
  // available height, so a resize or an orientation change alters it.
  let resizeDebounce;
  window.addEventListener("resize", () => {
    clearTimeout(resizeDebounce);
    resizeDebounce = setTimeout(() => {
      if (!lastData) return;
      renderBoard(lastData);
      updateMap(lastData);
    }, 150);
  });

  initMap();
  if (stopId) selectStop(stopId);
</script>
</body>
</html>
