<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Service</title>
<link href="/static/fonts/fonts.css?v=3" rel="stylesheet">
<link href="/static/vendor/maplibre-gl.css" rel="stylesheet">
<style>
  :root {
    --board: #101418;        /* board casing */
    --panel: #171d23;        /* row panel */
    --line:  #232c34;
    --amber: #ffb400;        /* LED amber, the busway PID colour */
    --amber-dim: #7a5a10;
    --text:  #e8edf1;
    --muted: #8fa0ad;
    --live:  #35d07f;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--board);
    color: var(--text);
    font-family: "Archivo", system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px 48px;
  }
  /* Narrow by default (board only). Widens once the map is alongside, using
     most of the viewport so a wide monitor isn't mostly empty margin. */
  main { width: 100%; max-width: 620px; }
  main.wide { max-width: min(1760px, 96vw); }

  header { margin-bottom: 20px; }
  .titlebar {
    display: flex; align-items: baseline; gap: 12px;
    flex-wrap: wrap; margin-top: 2px;
  }
  .titlebar[hidden] { display: none; }
  .change {
    background: none; border: 1px solid var(--line); border-radius: 999px;
    color: var(--muted); font: inherit; font-size: 12px;
    padding: 3px 11px; cursor: pointer; white-space: nowrap;
  }
  .change:hover { color: var(--text); border-color: var(--amber-dim); }
  .change:focus-visible { outline: 2px solid var(--amber-dim); outline-offset: 2px; }
  .eyebrow {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 14px;
  }
  /* Region switcher, only shown when more than one timetable is ingested. */
  .region-switch {
    background: none; border: 1px solid var(--line); border-radius: 999px;
    color: var(--muted); font: inherit; letter-spacing: 0.12em;
    padding: 2px 10px; cursor: pointer; text-transform: uppercase;
  }
  .region-switch:hover { color: var(--text); border-color: var(--amber-dim); }
  .region-switch[hidden] { display: none; }
  h1 { font-size: 22px; font-weight: 700; line-height: 1.25; }

  .search { position: relative; margin-bottom: 22px; }
  .search[hidden] { display: none; }
  .search-row { display: flex; gap: 10px; }
  .search-field { position: relative; flex: 1; }
  .near-me {
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    color: var(--muted); font: inherit; font-size: 13px; white-space: nowrap;
    padding: 0 16px; cursor: pointer;
  }
  .near-me:hover { color: var(--text); border-color: var(--amber-dim); }
  .near-me:focus-visible { outline: 2px solid var(--amber-dim); outline-offset: 2px; }
  .search-close {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: none; border: 0; color: var(--muted);
    font-size: 22px; line-height: 1; padding: 4px 8px; cursor: pointer;
  }
  .search-close:hover { color: var(--text); }
  .search-close[hidden] { display: none; }
  /* Keep typed text clear of the close button. */
  .search-field:has(.search-close:not([hidden])) input { padding-right: 42px; }
  .search input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font: inherit;
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
  }
  .search input:focus { border-color: var(--amber-dim); }
  .search-results {
    position: absolute; inset-inline: 0; top: calc(100% + 4px);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    /* Never past the bottom of the screen: fitResults() measures the real
       gap to the viewport edge and tightens this; the vh value is only the
       pre-measurement fallback. Overflow scrolls inside the dropdown. */
    max-height: 45vh; overflow-y: auto;
    z-index: 10;
  }
  .search-results button {
    display: flex; align-items: center; gap: 10px;
    width: 100%; text-align: left;
    background: none; border: 0; color: var(--text);
    font: inherit; font-size: 14px;
    padding: 10px 14px; cursor: pointer;
  }
  .search-results button:hover, .search-results button:focus-visible {
    background: #1f2731; outline: none;
  }
  .search-results .rmain {
    flex: 1 1 auto; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  /* A stop result carries its stop glyph, pinned to the row's right edge. */
  .search-results .ricon {
    flex: none; margin-left: auto;
    font-family: "Noto Emoji", system-ui, sans-serif;
    font-variant-emoji: text;
    font-size: 20px; line-height: 1; color: var(--muted);
  }
  .search-results .sid {
    font-family: "IBM Plex Mono", monospace;
    color: var(--muted); font-size: 12px; margin-left: 6px;
  }

  /* --- landing ----------------------------------------------------------- */
  /* First load, before any stop is chosen: nothing but the logo and the
     search. The board/map split is NOT display:none-d — MapLibre needs a
     sized container at construction or it never fires 'load' — it is parked
     off-screen, still sized, so the map warms up underneath the landing. */
  body.landing header, body.landing .status { display: none; }
  body.landing #split {
    position: fixed; left: -200vw; top: 0;
    width: min(1200px, 96vw);
    visibility: hidden; pointer-events: none;
  }
  body.landing .search { max-width: 560px; margin: 0 auto; }
  #hero { display: none; }
  body.landing #hero {
    display: flex; flex-direction: column; align-items: center;
    margin: max(14vh, 48px) 0 34px;
  }
  /* The goose: monochrome outline from the emoji subset, inked in the board's
     LED amber so it reads as part of the signage, not a sticker. */
  #hero .goose {
    font-family: "Noto Emoji", system-ui, sans-serif;
    font-variant-emoji: text;
    font-size: 96px; line-height: 1;
    color: var(--amber);
    text-shadow: 0 0 28px rgba(255, 180, 0, 0.35);
  }

  .board {
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
  }
  .row {
    display: grid;
    /* badge | destination | time-source + alerts | countdown */
    grid-template-columns: 130px 1fr 64px 96px;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--panel);
    border-top: 1px solid var(--line);
  }
  .row:first-child { border-top: 0; }

  /* Split badge: mode glyph | route number. Black plate, white border and
     divider; the glyph and the number both inherit the vehicle colour via
     `color`, so the badge matches the row stripe and the map marker. */
  .badge {
    justify-self: start;
    display: inline-flex;
    align-items: stretch;
    background: #000;
    border: 1px solid #fff;
    border-radius: 8px;
    overflow: hidden;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .badge .mode {
    display: flex; align-items: center; justify-content: center;
    padding: 6px 9px;
    border-right: 1px solid #fff;
  }
  /* Noto Emoji is monochrome, so the glyph inherits the badge's `color`.
     Listing it first means only these codepoints come from it. */
  .badge .mode {
    font-family: "Noto Emoji", "Archivo", system-ui, sans-serif;
    font-size: 22px;
    /* Belt and braces with the U+FE0E in the markup: newer engines honour this
       property, older ones only the variation selector. Both say the same
       thing — render these as text, not as colour emoji. */
    font-variant-emoji: text;
  }
  .badge .num {
    display: flex; align-items: center; justify-content: center;
    padding: 6px 10px; font-size: 22px; min-width: 48px;
  }
  .badge .num.wide { font-size: 15px; line-height: 1.15; padding: 6px 8px; }
  /* Named lines (Melbourne trains: "Williamstown") rather than numbers: clamp
     to the badge column instead of spilling into the destination. */
  .badge .num.xwide {
    font-size: 11px; line-height: 1.1; padding: 6px 6px;
    max-width: 74px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    display: block; align-content: center;
  }
  .dest { min-width: 0; }
  .dest .headsign {
    font-size: 15px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .dest .sub {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; color: var(--muted); margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  /* Every service carries its own colour — that is its identity, and it must
     not change as the service gains or loses a live position. */
  .row { border-left: 3px solid var(--vcolor); padding-left: 13px; }
  /* Any row can be picked to draw its route. */
  .row { cursor: pointer; }
  .row:hover { background: #1c242d; }
  .row:focus-visible { outline: 2px solid var(--vcolor); outline-offset: -2px; }
  /* The service whose route is currently drawn. */
  .row.selected {
    background: color-mix(in srgb, var(--vcolor) 14%, var(--panel));
    border-left-width: 6px; padding-left: 10px;
  }
  /* Flashed when its marker is clicked on the map, in its own colour so the
     pairing is unambiguous. */
  .row.flash { animation: rowflash 0.73s ease-in-out 3; }
  @keyframes rowflash {
    50% { background: color-mix(in srgb, var(--vcolor) 24%, var(--panel)); }
  }
  @keyframes pulse { 50% { opacity: 0.25; } }
  @media (prefers-reduced-motion: reduce) {
    .due { animation: none !important; }
    /* Still needs to be identifiable, so hold the tint rather than pulse it. */
    .row.flash {
      animation: none;
      background: color-mix(in srgb, var(--vcolor) 24%, var(--panel));
    }
  }

  .eta {
    font-family: "IBM Plex Mono", monospace;
    text-align: right;
    color: var(--amber);
    text-shadow: 0 0 12px rgba(255, 180, 0, 0.35);
  }
  .eta .num { font-size: 30px; font-weight: 600; line-height: 1; }
  .eta .unit { font-size: 11px; color: var(--amber-dim); letter-spacing: 0.1em; }
  /* The countdown carries the service colour too, so the row reads as one
     object. The amber glow is dropped — it would tint the colour. */
  .eta { color: var(--vcolor); text-shadow: none; }
  .eta .unit { color: var(--vcolor); opacity: 0.6; }
  /* 📶 realtime / 📅 timetable — its own column between destination and
     countdown, so neither the number nor "MIN" is shifted by it. */
  .src-col {
    font-family: "Noto Emoji", system-ui, sans-serif;
    font-size: 22px; line-height: 1;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    color: var(--vcolor); opacity: 0.85;
    font-variant-emoji: text;
  }
  /* Disruption warning, beside the source mark. Amber — it is a warning, not
     part of the service's identity, so it does not take the vehicle colour. */
  .alert-mark {
    color: var(--amber); cursor: pointer; opacity: 1;
    background: none; border: 0; font: inherit; padding: 2px;
    font-variant-emoji: text;
  }
  .alert-mark:hover { text-shadow: 0 0 8px rgba(255, 180, 0, 0.6); }
  .alert-mark:focus-visible { outline: 2px solid var(--amber-dim); outline-offset: 2px; }

  /* Disruption details popup. */
  .alert-modal {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(6, 9, 12, 0.72);
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .alert-modal[hidden] { display: none; }
  .alert-box {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    max-width: 560px; max-height: 76vh; overflow-y: auto;
    padding: 20px 22px; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
  }
  .alert-box h2 {
    font-size: 15px; margin-bottom: 12px; color: var(--amber);
    display: flex; align-items: center; gap: 8px;
  }
  .alert-box h2 .glyph { font-family: "Noto Emoji", sans-serif; font-variant-emoji: text; }
  .alert-item { border-top: 1px solid var(--line); padding: 12px 0; }
  .alert-item:first-of-type { border-top: 0; padding-top: 0; }
  .alert-item .effect {
    font-family: "IBM Plex Mono", monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.12em; color: var(--amber);
    margin-bottom: 4px;
  }
  .alert-item .head { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .alert-item .body {
    font-size: 13px; color: var(--muted); white-space: pre-line; line-height: 1.45;
  }
  .alert-close {
    margin-top: 14px; background: none; border: 1px solid var(--line);
    border-radius: 999px; color: var(--muted); font: inherit; font-size: 12px;
    padding: 4px 14px; cursor: pointer;
  }
  .alert-close:hover { color: var(--text); border-color: var(--amber-dim); }
  .eta .due {
    font-size: 22px; font-weight: 600; letter-spacing: 0.06em;
    animation: pulse 1.2s infinite;
  }

  .status {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; color: var(--muted);
    margin-top: 12px; text-align: right;
  }
  .empty, .error {
    padding: 32px 16px; text-align: center;
    color: var(--muted); font-size: 14px;
    background: var(--panel);
  }
  .error { color: #ff8a7a; }

  /* Both first-run panels — board and map — share one empty state so they read
     as a matched pair: same height, text on top, a monochrome glyph naming the
     panel's job beneath it. --ph-height keeps the two boxes exactly level. */
  :root { --ph-height: 240px; }
  .placeholder {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; min-height: var(--ph-height); padding: 24px;
  }
  .placeholder .ph-icon {
    font-family: "Noto Emoji", system-ui, sans-serif;
    font-variant-emoji: text;      /* the monochrome outline, tinted like text */
    font-size: 46px; line-height: 1;
    color: var(--muted); opacity: 0.6;
  }

  /* --- board + map layout ------------------------------------------------ */
  /* Stacked by default; side by side only when there is room AND a map. The
     board keeps its natural width and the map takes the remaining space. */
  .split { display: grid; grid-template-columns: minmax(0, 1fr); gap: 18px; }
  @media (min-width: 900px) {
    /* The board is a fixed, comfortable reading width on the left; the map takes
       all the remaining width, so the space a wide screen frees up goes to the
       map rather than to stretched-out rows. */
    .split.side-by-side {
      grid-template-columns: minmax(0, 560px) minmax(0, 1fr);
      align-items: start;
    }
    /* Fill the viewport height too, so the map is as big as fits without
       scrolling. The board caps its own rows to what fits (fittingRowCount). */
    .split.side-by-side #map { height: calc(100vh - 160px); min-height: 460px; }
    /* The map column is sticky so it stays visible against a long board. */
    .split.side-by-side #map-wrap { position: sticky; top: 24px; }
  }

  /* --- map view ---------------------------------------------------------- */
  #map-wrap[hidden] { display: none; }
  #map-wrap { position: relative; }
  /* Covers the map until a stop is chosen. The map is built and loading
     underneath — MapLibre needs a sized container, and having it warm means it
     draws the moment a stop is picked — but an empty view of Brisbane says
     nothing, so it is not shown. */
  /* Layout (centering, min-height) comes from .placeholder; this rule only
     covers the map and matches the board's panel styling. */
  .map-empty {
    position: absolute; inset: 0; z-index: 2; text-align: center;
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    color: var(--muted); font-size: 14px;
  }
  .map-empty[hidden] { display: none; }
  /* While the placeholder is up the map matches the board placeholder's height
     exactly, so the two first-run panels sit level. Still sized, so MapLibre
     can measure its container and load underneath. */
  #map-wrap.awaiting #map,
  .split.side-by-side #map-wrap.awaiting #map {
    /* +2px: the board's 1px border wraps its --ph-height placeholder (outer
       242), whereas #map is border-box (border inside height). Matching the
       outer boxes keeps the two empty panels exactly level. */
    height: calc(var(--ph-height) + 2px); min-height: calc(var(--ph-height) + 2px);
  }
  #map {
    height: 360px; border-radius: 10px; overflow: hidden;
    background: #0c1013; border: 1px solid #232c35;
  }
  .map-caption {
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 12px; padding: 8px 2px 0; color: var(--muted); font-size: 13px;
  }
  /* `display: flex` above outranks the UA `[hidden] { display: none }`, so
     without this the caption keeps its ~22px of layout even while hidden —
     which, under the opaque .map-empty overlay, made the empty map panel a text
     row taller than the board. */
  .map-caption[hidden] { display: none; }
  .map-caption .hint { font-family: "IBM Plex Mono", monospace; font-size: 11px; }
  /* MapLibre's own chrome, toned down to match the board */
  .maplibregl-ctrl-attrib { background: rgba(12,16,19,.8) !important; }
  .maplibregl-ctrl-attrib a { color: #7f8c99 !important; }
  .maplibregl-popup-content {
    background: var(--panel); color: var(--text);
    font-family: Archivo, system-ui, sans-serif; font-size: 13px;
    border-radius: 8px; padding: 8px 10px; border: 1px solid #2b3742;
  }
  .maplibregl-popup-content .pop-route { font-weight: 700; }
  .maplibregl-popup-content .pop-sub {
    color: var(--muted); font-size: 11px;
    font-family: "IBM Plex Mono", monospace;
  }
  .maplibregl-popup-tip { border-top-color: var(--panel) !important; }
</style>
</head>
<!-- `landing` in the markup so a cold load paints the landing directly; when
     the URL already names a stop, syncChrome() removes it before first paint
     (the script runs synchronously at the end of the body). -->
<body class="landing">
<main>
  <header>
    <div class="eyebrow">
      <span id="region-name">Translink · South East Queensland</span>
      <button class="region-switch" id="change-region" type="button" hidden></button>
    </div>
    <!-- Only once a stop is chosen; before that the name would just say
         "Next service", which costs a line and tells you nothing. -->
    <div class="titlebar" id="titlebar" hidden>
      <h1 id="stop-name"></h1>
      <button class="change" id="change-stop" type="button">Change stop</button>
    </div>
  </header>

  <!-- Landing logo; only visible while no stop is chosen. -->
  <div id="hero">
    <div class="goose" role="img" aria-label="Next Service">&#x1FABF;&#xFE0E;</div>
  </div>

  <div class="search" id="search-wrap">
    <div class="search-row">
      <div class="search-field">
        <input id="search" type="search"
               placeholder="Search for a stop or an address"
               autocomplete="off" aria-label="Search for a stop or an address">
        <!-- Only offered when there is a stop to go back to. -->
        <button class="search-close" id="search-close" type="button"
                aria-label="Close search" hidden>&times;</button>
      </div>
      <button class="near-me" id="near-me" type="button"
              title="Find stops near your current location">near me</button>
    </div>
    <div class="search-results" id="results" hidden></div>
  </div>

  <div class="split" id="split">
    <div class="board" id="board">
      <div class="empty placeholder">
        <div>Search for a stop to see departures.</div>
        <div class="ph-icon">&#x1F570;&#xFE0E;</div>
      </div>
    </div>
    <div id="map-wrap" class="awaiting" hidden>
      <div id="map"></div>
      <div class="map-empty placeholder" id="map-empty">
        <div>Search for a stop to see it on the map.</div>
        <div class="ph-icon">&#x1F30F;&#xFE0E;</div>
      </div>
      <!-- `awaiting` is dropped by selectStop, which then resizes the map. -->
      <div class="map-caption" id="map-caption" hidden>
        <span id="map-status">live vehicle positions</span>
        <span class="hint">click a service to show its route</span>
      </div>
    </div>
  </div>

  <div class="status" id="status"></div>

  <!-- Disruption details, opened from a row's ⚠ mark. -->
  <div class="alert-modal" id="alert-modal" hidden>
    <div class="alert-box" id="alert-box" role="dialog" aria-label="Service disruptions"></div>
  </div>
</main>

<script src="/static/vendor/maplibre-gl.js"></script>
<script src="/static/vendor/pmtiles.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  let stopId = new URLSearchParams(location.search).get("stop");
  let timer = null;

  // --- region ------------------------------------------------------------
  // One board, many networks. The region picks the timetable DB, the realtime
  // feeds, the timezone and the basemap — all server-side; the client just
  // scopes its API calls and reloads when switched (the map style, caches and
  // colour state are all per-network, so a clean start is correct).
  const region = new URLSearchParams(location.search).get("region")
              || localStorage.getItem("region") || "seq";
  localStorage.setItem("region", region);
  const api = (path) => `/api/r/${region}${path}`;

  function switchRegion(next) {
    if (next === region) return;
    localStorage.setItem("region", next);
    location.href = `?region=${encodeURIComponent(next)}`;   // drop the stop
  }

  // Times on the board are the *network's* clock, not the viewer's: a Brisbane
  // browser looking at Melbourne shows AEDT. Filled from /config; until then
  // the viewer's zone is a harmless first-paint fallback.
  let regionTz;
  fetch(api("/config")).then((r) => r.json())
    .then((c) => { regionTz = c.tz; }).catch(() => {});

  // The eyebrow names the current network and, when more than one timetable is
  // ingested, becomes the switcher. The same list drives the search fan-out:
  // results can come from ANY ingested region — the landing page names no
  // region, so each result row carries its state (QLD/VIC) instead.
  let regionList = [{ id: region, name: "", state: "" }];
  const stateOf = (rid) =>
    (regionList.find((r) => r.id === rid) || {}).state || "";
  // Search order: the remembered region's results list first.
  const regionOrder = () =>
    [...regionList].sort((a, b) => (b.id === region) - (a.id === region));
  const regionsReady = fetch("/api/regions").then((r) => r.json()).then((regions) => {
    regionList = regions;
    const cur = regions.find((r) => r.id === region) || regions[0];
    $("region-name").textContent = cur.name;
    if (regions.length > 1) {
      const next = regions[(regions.findIndex((r) => r.id === cur.id) + 1)
                           % regions.length];
      const b = $("change-region");
      b.hidden = false;
      b.textContent = `⇄ ${next.name.split("·")[1]?.trim() || next.name}`;
      b.title = `Switch to ${next.name}`;
      b.onclick = () => switchRegion(next.id);
    }
  }).catch(() => { /* the static eyebrow text stands */ });
  // With no stop there is nothing but the search, so it is always open. Once a
  // stop is chosen the search folds away and "Change stop" brings it back.
  let searchOpen = !stopId;

  function syncChrome() {
    // No stop yet = the landing: just the goose and the search. The class
    // hides the chrome and parks the board/map split off-screen (still sized,
    // so the map keeps warming underneath).
    document.body.classList.toggle("landing", !stopId);
    $("titlebar").hidden = !stopId;
    $("search-wrap").hidden = Boolean(stopId) && !searchOpen;
    $("search-close").hidden = !stopId;   // nothing to return to without one
    if (!searchOpen) $("results").hidden = true;
  }

  function openSearch() {
    searchOpen = true;
    syncChrome();
    $("search").focus();
  }

  function closeSearch() {
    searchOpen = false;
    $("search").value = "";
    syncChrome();
  }

  $("change-stop").addEventListener("click", openSearch);
  $("search-close").addEventListener("click", closeSearch);
  $("search").addEventListener("keydown", (e) => {
    if (e.key === "Escape" && stopId) closeSearch();
  });

  // --- stop search -------------------------------------------------------
  // Three ways into the same dropdown: stop-name search, address search
  // (geocoded server-side), and "near me" (browser geolocation). The last two
  // both end at nearbyStops(), which lists the closest stops with distances.
  const fmtDist = (m) => m < 1000 ? `${m} m` : `${(m / 1000).toFixed(1)} km`;

  function resultButton(html, onclick) {
    const b = document.createElement("button");
    b.innerHTML = html;
    b.onclick = onclick;
    $("results").appendChild(b);
    return b;
  }

  function resultNote(text) {
    const b = document.createElement("button");
    b.textContent = text;
    b.disabled = true;
    b.style.color = "var(--muted)";
    b.style.cursor = "default";
    $("results").appendChild(b);
  }

  // The dropdown must never run past the bottom of the screen, on any device:
  // cap it to the space between its own top edge and the viewport bottom, and
  // let the overflow scroll inside. visualViewport (where available) tracks
  // the on-screen keyboard, which window.innerHeight does not.
  function fitResults() {
    const box = $("results");
    if (box.hidden) return;
    const vh = window.visualViewport ? window.visualViewport.height
                                     : window.innerHeight;
    const top = box.getBoundingClientRect().top;
    box.style.maxHeight = `${Math.max(96, vh - top - 12)}px`;
  }
  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", fitResults);
  }

  // A picked stop in another region: remember the region and reload straight
  // onto the stop — the map style, caches and colours are all per-network.
  function openInRegion(rid, sid) {
    localStorage.setItem("region", rid);
    location.href =
      `?region=${encodeURIComponent(rid)}&stop=${encodeURIComponent(sid)}`;
  }

  function stopEntry(s) {
    const bits = [];
    if (s.is_station) bits.push("station");
    if (s.dist_m != null) bits.push(fmtDist(s.dist_m));
    bits.push(s.stop_id);
    if (s.state) bits.push(s.state);
    const rid = s.region || region;
    resultButton(
      `<span class="rmain">${escapeHtml(s.stop_name)}` +
        `<span class="sid">${bits.join(" · ")}</span></span>` +
        `<span class="ricon" aria-hidden="true">` +
        `${asText(landmarkGlyph(s.route_type))}</span>`,
      () => (rid === region ? selectStop(s.stop_id)
                            : openInRegion(rid, s.stop_id)),
    );
  }

  // Stop names and geocoder labels are external data; never trust them as HTML.
  const escapeHtml = (t) => String(t).replace(/[&<>"']/g,
    (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  // rid: the region the point is known to be in (an address hit knows its
  // region); null means "no idea" (geolocation) — ask every region and let
  // distance sort it out, since only the right city returns anything close.
  async function nearbyStops(lat, lon, label, rid = null) {
    const box = $("results");
    box.innerHTML = "";
    resultNote(`Stops near ${label}…`);
    box.hidden = false;
    fitResults();
    try {
      await regionsReady.catch(() => {});
      const rids = rid ? [{ id: rid, state: stateOf(rid) }] : regionOrder();
      const lists = await Promise.all(rids.map(async (r) => {
        try {
          const res = await fetch(
            `/api/r/${r.id}/stops/nearby?lat=${lat}&lon=${lon}`);
          return (await res.json())
            .map((s) => ({ ...s, region: r.id, state: r.state }));
        } catch { return []; }
      }));
      const stops = lists.flat().sort((a, b) => a.dist_m - b.dist_m).slice(0, 10);
      box.innerHTML = "";
      if (!stops.length) { resultNote(`No stops near ${label}.`); return; }
      stops.forEach(stopEntry);
    } catch {
      box.innerHTML = "";
      resultNote("Could not look up nearby stops.");
    } finally {
      fitResults();
    }
  }

  // Append address candidates to the dropdown (below any stop matches).
  // Every region is asked — the geocoder is bounded to each region's bbox, so
  // a Melbourne street typed from a Brisbane browser still resolves. The
  // server serialises the upstream Nominatim calls to keep its 1 req/s rule.
  async function searchAddress(q, { clear = true } = {}) {
    const box = $("results");
    if (clear) { box.innerHTML = ""; resultNote(`Looking up “${q}”…`); }
    box.hidden = false;
    fitResults();
    try {
      await regionsReady.catch(() => {});
      const lists = await Promise.all(regionOrder().map(async (r) => {
        try {
          const res = await fetch(
            `/api/r/${r.id}/geocode?q=${encodeURIComponent(q)}`);
          if (!res.ok) return null;
          return (await res.json())
            .map((p) => ({ ...p, region: r.id, state: r.state }));
        } catch { return null; }
      }));
      if (lists.every((l) => l === null)) throw new Error();
      const places = lists.filter(Boolean).flat();
      if (clear) box.innerHTML = "";
      if (!places.length) {
        if (clear) resultNote(`Nothing found for “${q}”.`);
        return;
      }
      places.forEach((p) => {
        // Just the label ('lead, suburb STATE', built server-side) — no tag:
        // an address row is recognisable by its shape, and the missing stop
        // glyph on the right already tells it apart from a stop.
        resultButton(
          `<span class="rmain">${escapeHtml(p.label)}</span>`,
          () => nearbyStops(p.lat, p.lon, "that address", p.region),
        );
      });
    } catch {
      if (clear) { box.innerHTML = ""; resultNote("Address lookup unavailable right now."); }
    } finally {
      fitResults();
    }
  }

  // A trailing word may still be mid-typing; an address is assumed once the
  // query has a house number or is long enough that no stop matched it.
  const looksLikeAddress = (q) => /^\d+\s+\S/.test(q);

  // Stop-name search fans out over every ingested region; the row's state
  // label (QLD/VIC) is what tells two "Central Station"s apart.
  async function searchStops(q) {
    await regionsReady.catch(() => {});
    const lists = await Promise.all(regionOrder().map(async (r) => {
      try {
        const res = await fetch(
          `/api/r/${r.id}/stops/search?q=${encodeURIComponent(q)}`);
        return (await res.json())
          .map((s) => ({ ...s, region: r.id, state: r.state }));
      } catch { return []; }
    }));
    return lists.flat();
  }

  let searchDebounce;
  let searchToken = 0;      // drops stale responses that finish out of order
  $("search").addEventListener("input", (e) => {
    clearTimeout(searchDebounce);
    const q = e.target.value.trim();
    if (q.length < 3) { $("results").hidden = true; return; }
    searchDebounce = setTimeout(async () => {
      const token = ++searchToken;
      const stops = await searchStops(q);
      if (token !== searchToken) return;
      const box = $("results");
      box.innerHTML = "";
      stops.forEach(stopEntry);
      // Address lookup happens automatically — nobody should have to say
      // "that was an address": a query starting with a house number is one,
      // and a longer query matching no stop name probably is too. The longer
      // debounce below keeps mid-typing queries away from the shared geocoder.
      if (looksLikeAddress(q) && q.length >= 6) {
        await searchAddress(q, { clear: stops.length === 0 });
      } else if (!stops.length && q.length >= 6) {
        await searchAddress(q);
      }
      box.hidden = box.children.length === 0;
      fitResults();
    }, q.length >= 6 ? 500 : 250);
  });

  $("near-me").addEventListener("click", () => {
    const box = $("results");
    if (!navigator.geolocation) {
      box.innerHTML = ""; resultNote("This browser has no geolocation."); box.hidden = false;
      return;
    }
    box.innerHTML = "";
    resultNote("Locating…");
    box.hidden = false;
    fitResults();
    navigator.geolocation.getCurrentPosition(
      (pos) => nearbyStops(pos.coords.latitude, pos.coords.longitude, "you"),
      () => {
        box.innerHTML = "";
        // Browsers only allow geolocation on HTTPS (localhost excepted).
        resultNote(location.protocol === "http:" && location.hostname !== "localhost"
          ? "Location blocked: geolocation needs HTTPS."
          : "Could not get your location.");
      },
      { enableHighAccuracy: false, timeout: 8000, maximumAge: 60000 },
    );
  });

  function selectStop(id) {
    stopId = id;
    selectedTrip = null;      // a route from the previous stop is not relevant
    // There is something to look at now: uncover the map and give it its full
    // height, then tell MapLibre the container changed.
    $("map-empty").hidden = true;
    $("map-caption").hidden = false;
    if ($("map-wrap").classList.contains("awaiting")) {
      $("map-wrap").classList.remove("awaiting");
      if (mapReady) cameraMove(() => map.resize());
    }
    autoFit = true;           // a new stop re-enables auto-fit...
    forceFit = true;          // ...and reframes even if the user had panned
    closeSearch();            // a stop is chosen: fold the search away
    syncRailStationFilter();  // stop drawing the station we now view in grey
    history.replaceState(null, "", `?region=${region}&stop=${id}`);
    refresh();
    clearInterval(timer);
    timer = setInterval(refresh, 15000);
  }

  // --- map ---------------------------------------------------------------
  // The basemap is a self-hosted Protomaps extract on the data volume. If the
  // deployment has no basemap, /api/config says so and the map stays hidden —
  // the board is the product, the map is an enhancement.
  let map = null, mapReady = false, hasBasemap = false;
  // The view auto-fits to the stop plus every tracked vehicle. It stops doing
  // so the moment the user moves the map themselves, and resumes on the next
  // stop selection. `programmatic` distinguishes our own camera moves from
  // theirs — including the +/- buttons, which move the map without a DOM event.
  let autoFit = true, forceFit = true, programmatic = false;

  // Twelve hues at 30° spacing. Every departure gets one now, not just the
  // tracked ones, so the palette has to cover a full board. Colour identifies
  // a *service*; it must not shift when that service gains or loses a live
  // position, which is why live/scheduled is shown separately.
  const VEHICLE_COLORS = [
    "#ff5a52", // red
    "#ff8a2b", // orange
    "#ffc21f", // amber
    "#d8e02a", // yellow-lime
    "#7ee02a", // lime
    "#2fd07a", // green
    "#25d3b0", // teal
    "#22d3ee", // cyan
    "#4e8cff", // blue
    "#8a7bff", // indigo
    "#c06bff", // purple
    "#ff5fb0", // magenta
  ];
  // Landmarks: the stops themselves, never a service.
  const LANDMARK_INK = "#8c98a4";          // grey — every landmark
  const LANDMARK_SELECTED_INK = "#ffffff"; // white — the stop being viewed

  // Mode glyphs, rendered in the monochrome Noto Emoji face so they tint with
  // `color` like ordinary text. GTFS route_type: 0 tram, 1 metro, 2 rail,
  // 3 bus, 4 ferry.
  const MODE_EMOJI = {
    0: "\u{1F68A}", // 🚊 tram
    1: "\u{1F686}", // 🚆 train
    2: "\u{1F686}", // 🚆 train
    3: "\u{1F68D}", // 🚍 bus
    4: "\u{26F4}",  // ⛴ ferry
  };
  const DEFAULT_EMOJI = MODE_EMOJI[3];

  // Landmark glyphs — the physical stop, not the service calling at it.
  const STOP_STATION = "\u{1F3EB}";  // 🏫
  const STOP_BUS = "\u{1F68F}";      // 🚏
  const STOP_TRAM = "\u{1F689}";     // 🚉
  const STOP_FERRY = "\u{2638}";     // ☸ wharf — the vehicle keeps ⛴

  // Where the arrival time came from.
  const MARK_LIVE = "\u{1F6DC}";      // 🛜 realtime prediction
  const MARK_SCHEDULED = "\u{1F4C5}"; // 📅 timetable only
  const MARK_ALERT = "\u{26A0}";      // ⚠ service disruption

  // These codepoints default to *emoji presentation*, and browsers hand those
  // to the system colour-emoji font regardless of font-family — so on a machine
  // with Noto Color Emoji installed our monochrome face is ignored. U+FE0E
  // (VARIATION SELECTOR-15) requests text presentation instead, which lets the
  // font-family stack apply. Only for the DOM: canvas shapes text itself and
  // already picks the right face.
  const asText = (glyph) => glyph + "︎";

  function landmarkGlyph(routeType) {
    switch (Number(routeType)) {
      case 3: return STOP_BUS;
      case 4: return STOP_FERRY;
      case 0: return STOP_TRAM;
      case 1: case 2: return STOP_STATION;
      default: return STOP_BUS;
    }
  }

  // The stop being viewed, judged by what actually calls there rather than by
  // location_type, which cannot tell a ferry terminal from a bus stop.
  function stopGlyph(data) {
    // If trains call here it is a train station, even when buses out-number
    // them — Varsity Lakes is a station with 10 bus bays, not a bus stop. The
    // majority vote below is only for deciding between the non-rail modes.
    if (data.departures.some((d) => [1, 2].includes(Number(d.route_type)))) {
      return STOP_STATION;
    }
    const counts = {};
    data.departures.forEach((d) => {
      counts[d.route_type] = (counts[d.route_type] || 0) + 1;
    });
    const top = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
    if (top) return landmarkGlyph(Number(top[0]));
    return data.stop.location_type === 1 ? STOP_STATION : STOP_BUS;
  }

  // A service keeps its colour. Once assigned, a trip_id holds that colour for
  // as long as it is remembered — across refreshes, as the board advances, and
  // whether or not it currently has a live position. Insertion-ordered, so the
  // oldest entry is the first evicted.
  const colorMemory = new Map();   // trip_id -> palette index
  const COLOR_MEMORY_MAX = 300;    // a few hours of a busy board

  // Of the colours not already on screen, take the one furthest around the
  // wheel from those that are — so a newly arriving service is as distinct as
  // the remaining palette allows, rather than just the next index along.
  function pickFreeIndex(usedIdx) {
    const P = VEHICLE_COLORS.length;
    const free = [];
    for (let i = 0; i < P; i++) if (!usedIdx.has(i)) free.push(i);
    if (!free.length) return usedIdx.size % P;   // more services than colours
    if (!usedIdx.size) return 0;
    let best = free[0], bestGap = -1;
    for (const i of free) {
      let gap = P;
      for (const j of usedIdx) {
        const d = Math.abs(i - j);
        gap = Math.min(gap, Math.min(d, P - d));
      }
      if (gap > bestGap) { bestGap = gap; best = i; }
    }
    return best;
  }

  function assignColors(items) {
    const out = {}, usedIdx = new Set();

    // Remembered colours win, provided nothing else on screen has taken it.
    for (const d of items) {
      const idx = colorMemory.get(d.trip_id);
      if (idx !== undefined && !usedIdx.has(idx)) {
        out[d.trip_id] = VEHICLE_COLORS[idx];
        usedIdx.add(idx);
      }
    }
    // Anything new — or displaced by a collision — takes a free colour.
    for (const d of items) {
      if (out[d.trip_id]) continue;
      const idx = pickFreeIndex(usedIdx);
      out[d.trip_id] = VEHICLE_COLORS[idx];
      usedIdx.add(idx);
      colorMemory.set(d.trip_id, idx);
    }
    // Re-insert the ones still on screen so eviction drops genuinely stale
    // trips first, not the ones currently being looked at.
    for (const d of items) {
      const idx = colorMemory.get(d.trip_id);
      colorMemory.delete(d.trip_id);
      colorMemory.set(d.trip_id, idx);
    }
    while (colorMemory.size > COLOR_MEMORY_MAX) {
      colorMemory.delete(colorMemory.keys().next().value);
    }
    return out;
  }

  async function initMap() {
    let cfg;
    try {
      cfg = await (await fetch(api("/config"))).json();
      hasBasemap = !!cfg.basemap;
    } catch { hasBasemap = false; }
    if (!hasBasemap) return;

    // Must complete before any icon is rasterised, or the wrong glyph gets
    // baked into the cached image. ensureVehicleIcon only runs after the map's
    // 'load', which is well after this await.
    await loadEmojiFont();

    // Reveal before constructing the Map: MapLibre measures its container at
    // construction, and a display:none container gives it zero size — the map
    // then never fires 'load' and paints nothing.
    $("map-wrap").hidden = false;
    // Only go two-column once there is actually a map to put in the second one.
    $("split").classList.add("side-by-side");
    document.querySelector("main").classList.add("wide");

    // {metadata: true} is required: the style's source uses `url:`, so MapLibre
    // asks the protocol for TileJSON. Without this flag pmtiles ignores that
    // request — the promise never settles, and the style hangs with no error.
    maplibregl.addProtocol("pmtiles", new pmtiles.Protocol({ metadata: true }).tile);
    // The style is one hand-written file; only the basemap archive differs per
    // region, so fetch the style and point its source at this region's pmtiles.
    // ?v bumped whenever the style schema changes. Browsers heuristically
    // cached this JSON before it was served no-cache, and a stale style from
    // the old basemap schema fails layer-by-layer against the new tiles —
    // water happened to render (both schemas have a "water" layer), roads and
    // labels silently didn't. A new URL is a guaranteed cache miss.
    const style = await (await fetch("/static/map-style.json?v=3")).json();
    style.sources.omt.url = "pmtiles://" + cfg.basemap_url;
    map = new maplibregl.Map({
      container: "map",
      style,
      center: cfg.center,            // the region's city, until a stop is chosen
      zoom: 11,
      attributionControl: { compact: true },
    });
    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), "top-right");

    // A bad style silently yields a blank map: MapLibre reports it here and
    // nowhere else, and a style error stops 'load' firing at all, so every
    // layer we add in that handler never exists. Surface it rather than let
    // the map look merely empty.
    map.on("error", (e) => {
      const msg = (e && e.error && e.error.message) || "map error";
      console.error("[map]", msg);
      const el = $("map-status");
      if (el) el.textContent = `map: ${msg}`;
    });

    map.on("load", () => {
      map.addSource("vehicles", { type: "geojson", data: emptyFC() });
      map.addSource("ghosts", { type: "geojson", data: emptyFC() });
      map.addSource("stop", { type: "geojson", data: emptyFC() });
      map.addSource("landmarks", { type: "geojson", data: emptyFC() });
      map.addSource("all-stops", { type: "geojson", data: emptyFC() });
      map.addSource("routes", { type: "geojson", data: emptyFC() });

      // The path each tracked vehicle is following, in that vehicle's colour.
      // Bottom of the stack: it is context for the markers, not the subject.
      map.addLayer({
        id: "routes", type: "line", source: "routes",
        layout: { "line-join": "round", "line-cap": "round" },
        paint: {
          "line-color": ["get", "color"],
          "line-width": ["interpolate", ["linear"], ["zoom"], 10, 1.5, 15, 4],
          "line-opacity": 0.55,
        },
      });

      // Every stop in the network, once the user is close enough that street
      // detail is the point (all backstreets legible ≈ z15+). Lazily fetched on
      // first zoom past the threshold; overlap-thinned so a busy interchange
      // stays readable; clickable to select. Below the route landmarks so a
      // traced route's own stops win any tie.
      map.addLayer({
        id: "all-stops", type: "symbol", source: "all-stops",
        minzoom: 15,
        layout: {
          "icon-image": ["get", "icon"],
          // Stations slightly larger, and placed FIRST (lower sort key wins
          // collisions): a station sits exactly where bus stops cluster, and
          // without priority the overlap thinning can drop the 🏫 in favour of
          // an adjacent 🚏. NOTE: the zoom interpolate must be the OUTERMOST
          // expression — a feature `case` wrapped around it fails validation
          // and MapLibre silently drops the whole layer.
          "icon-size": ["interpolate", ["linear"], ["zoom"],
            15, ["case", ["==", ["get", "rt"], 2], 0.7, 0.55],
            17, ["case", ["==", ["get", "rt"], 2], 1.1, 0.9]],
          "symbol-sort-key": ["case", ["==", ["get", "rt"], 2], 0, 1],
          // Near-coincident stops carry a computed offset so they fan out into
          // a row instead of colliding (see maybeLoadAllStops).
          "icon-offset": ["coalesce", ["get", "off"], ["literal", [0, 0]]],
          "icon-anchor": "bottom",
          "icon-allow-overlap": false,
          "icon-padding": 2,
        },
      });

      // The selected route's stops (and the viewed stop's across-the-road
      // pairs), in grey. Drawn above all-stops so a traced route's own stops
      // win any tie. Stations get no special layer — they are stops like any
      // other, in all-stops past zoom 15 and here when on a traced route.
      map.addLayer({
        id: "landmarks", type: "symbol", source: "landmarks",
        layout: {
          "icon-image": ["get", "icon"],
          "icon-size": ["interpolate", ["linear"], ["zoom"], 11, 0.6, 15, 1.05],
          "icon-anchor": "bottom",
          // Unlike the vehicles, these may crowd: let MapLibre thin them out.
          "icon-allow-overlap": false,
          "icon-padding": 2,
        },
      });

      // Ghosts: timetable-estimated positions for board trips with no live GPS.
      // Drawn below the real vehicles and the viewed stop — an estimate must
      // never outrank a fix. Faded icon + a dashed-looking hollow ring + a "~N"
      // label all say "approximate".
      map.addLayer({
        id: "ghost-ping", type: "circle", source: "ghosts",
        filter: PING_OFF,
        paint: {
          "circle-radius": 10, "circle-color": ["get", "color"],
          "circle-opacity": 0.2,
          "circle-stroke-width": 2, "circle-stroke-color": ["get", "color"],
          "circle-stroke-opacity": 0.7,
        },
      });
      // A hollow ring under every ghost, so it reads as a placeholder rather
      // than a solid presence even before you notice the faded glyph.
      map.addLayer({
        id: "ghost-halo", type: "circle", source: "ghosts",
        paint: {
          "circle-radius": ["interpolate", ["linear"], ["zoom"], 10, 10.5, 15, 16.5],
          "circle-color": "rgba(0,0,0,0)",
          "circle-stroke-width": 1.5,
          "circle-stroke-color": ["get", "color"],
          "circle-stroke-opacity": 0.55,
        },
      });
      map.addLayer({
        id: "ghost-dot", type: "symbol", source: "ghosts",
        layout: {
          "icon-image": ["get", "icon"],
          "icon-size": ["interpolate", ["linear"], ["zoom"], 10, 0.75, 15, 1.23],
          "icon-allow-overlap": true,
          // Always drawn, but must not BLOCK the street furniture: a marker
          // sitting at a stop would otherwise suppress the nearby stop icons
          // on the overlap-thinned layers (a station right beside the viewed
          // stop was losing that collision and vanishing).
          "icon-ignore-placement": true,
        },
        paint: { "icon-opacity": 0.5 },   // estimated, not live
      });
      map.addLayer({
        id: "ghost-label", type: "symbol", source: "ghosts",
        layout: {
          "text-field": ["concat", "~", ["get", "minutes"], " min"],
          "text-font": ["Noto Sans Medium"],
          "text-size": 11, "text-offset": [0, 2.3],
          "text-allow-overlap": false,
        },
        paint: {
          "text-color": ["coalesce", ["get", "color"], "#c9d4de"],
          "text-opacity": 0.75,
          "text-halo-color": "#0c1013", "text-halo-width": 1.4,
        },
      });

      map.addLayer({
        id: "stop-ring", type: "symbol", source: "stop",
        layout: {
          "icon-image": ["get", "icon"],
          "icon-size": ["interpolate", ["linear"], ["zoom"], 10, 0.975, 15, 1.575],
          "icon-allow-overlap": true,
          "icon-ignore-placement": true,   // see ghost-dot: never blocks stops
          "icon-anchor": "bottom",   // the marker sits on the stop, not over it
        },
      });
      // Expanding ring used to ping one vehicle. Below the icons so it never
      // obscures them; filtered to nothing until a ping is requested.
      map.addLayer({
        id: "vehicle-ping", type: "circle", source: "vehicles",
        filter: PING_OFF,
        paint: {
          "circle-radius": 10,
          "circle-color": ["get", "color"],
          "circle-opacity": 0.35,
          "circle-stroke-width": 2,
          "circle-stroke-color": ["get", "color"],
          "circle-stroke-opacity": 0.9,
        },
      });

      map.addLayer({
        id: "vehicle-dot", type: "symbol", source: "vehicles",
        layout: {
          // The mode emoji, tinted to match the board row's badge and stripe.
          "icon-image": ["get", "icon"],
          "icon-size": ["interpolate", ["linear"], ["zoom"], 10, 0.9, 15, 1.5],
          "icon-allow-overlap": true,
          "icon-ignore-placement": true,   // see ghost-dot: never blocks stops
        },
      });
      map.addLayer({
        id: "vehicle-label", type: "symbol", source: "vehicles",
        layout: {
          // Minutes-away is what ties a dot to its row at a glance; the route
          // number is often identical across several vehicles here.
          "text-field": ["concat", ["get", "minutes"], " min"],
          "text-font": ["Noto Sans Medium"],
          "text-size": 11,
          "text-offset": [0, 2.3],
          "text-allow-overlap": false,
        },
        paint: {
          "text-color": ["coalesce", ["get", "color"], "#c9d4de"],
          "text-halo-color": "#0c1013", "text-halo-width": 1.4,
        },
      });

      map.on("click", "vehicle-dot", (e) => {
        const p = e.features[0].properties;
        new maplibregl.Popup({ closeButton: false, offset: 12 })
          .setLngLat(e.features[0].geometry.coordinates)
          .setHTML(
            `<div class="pop-route">${p.route ?? ""} · ${p.headsign ?? ""}</div>` +
            `<div class="pop-sub">${p.minutes} min away${p.age ? " · seen " + p.age + "s ago" : ""}</div>`)
          .addTo(map);
        flashRow(p.trip);
        selectRoute(p.trip);
      });

      // Same as a vehicle click, but the popup owns up to being an estimate.
      map.on("click", "ghost-dot", (e) => {
        const p = e.features[0].properties;
        new maplibregl.Popup({ closeButton: false, offset: 12 })
          .setLngLat(e.features[0].geometry.coordinates)
          .setHTML(
            `<div class="pop-route">${p.route ?? ""} · ${p.headsign ?? ""}</div>` +
            `<div class="pop-sub">~${p.minutes} min · estimated from timetable (no live GPS)</div>`)
          .addTo(map);
        flashRow(p.trip);
        selectRoute(p.trip);
      });

      // One handler decides what a map click does, so overlapping markers
      // resolve deterministically. Two per-layer handlers used to both fire
      // when a bus stop and an always-on station overlapped, and the station's
      // won — so the bus stop "did nothing". Priority now: a vehicle/ghost keeps
      // its own popup handler; else a route bus stop beats a background station
      // (you are clicking the stop you traced); else empty map clears the route.
      const stopLayers = ["landmarks", "all-stops"];
      map.on("click", (e) => {
        // Vehicles and ghosts have their own handlers below; leave those to them.
        if (map.queryRenderedFeatures(e.point, { layers: ["vehicle-dot", "ghost-dot"] }).length) return;
        const stops = map.queryRenderedFeatures(e.point, { layers: stopLayers });
        if (stops.length) {
          const pick = stops.find((f) => f.layer.id === "landmarks") || stops[0];
          if (pick.properties.stop_id) selectStop(pick.properties.stop_id);
          return;
        }
        if (selectedTrip) selectRoute(selectedTrip);   // empty map → clear route
      });
      for (const lyr of ["vehicle-dot", "ghost-dot", ...stopLayers]) {
        map.on("mouseenter", lyr, () => map.getCanvas().style.cursor = "pointer");
        map.on("mouseleave", lyr, () => map.getCanvas().style.cursor = "");
      }

      // Only a move carrying a DOM event is the user taking control — a drag,
      // a wheel, a pinch. Testing `programmatic` instead looked equivalent but
      // was not: map.resize() below fires movestart with the flag clear, which
      // switched auto-fit off during startup and left it off forever. The cost
      // is that the +/- buttons no longer disable auto-fit, which is the far
      // less annoying failure.
      map.on("movestart", (e) => { if (e.originalEvent) autoFit = false; });
      map.on("moveend", () => { programmatic = false; });

      mapReady = true;
      cameraMove(() => map.resize());
      map.on("zoomend", maybeLoadAllStops);
      maybeLoadAllStops();  // in case the map starts past the threshold
      if (lastData) updateMap(lastData);
    });

    // ?mapdebug=1 — ground-truth probe, run in the viewer's own browser (the
    // dev harness cannot render MapLibre at all). On every idle it logs which
    // style is actually loaded and how many features each basemap layer really
    // rendered. Console, not the caption — the 15s poll overwrites the caption.
    if (new URLSearchParams(location.search).get("mapdebug")) {
      map.on("idle", () => {
        const s = map.getStyle();
        const counts = {};
        for (const id of ["water", "road-major", "road-secondary", "road-minor",
                          "busway", "rail", "place", "landcover-green",
                          "all-stops", "landmarks", "vehicle-dot", "ghost-dot"]) {
          try {
            counts[id] = map.getLayer(id)
              ? map.queryRenderedFeatures({ layers: [id] }).length
              : "NO-LAYER";
          } catch (e) { counts[id] = "ERR:" + e.message; }
        }
        console.log(`[mapdebug] style=${s.name} zoom=${map.getZoom().toFixed(1)}`, counts);
      });
    }
  }

  const emptyFC = () => ({ type: "FeatureCollection", features: [] });

  // Route geometry is static for the life of a timetable, so fetch each shape
  // once and keep it. `pending` stops a slow fetch being issued repeatedly by
  // successive polls.
  const shapeCache = new Map(), shapePending = new Set();

  async function ensureShape(shapeId) {
    if (!shapeId || shapeCache.has(shapeId) || shapePending.has(shapeId)) return;
    shapePending.add(shapeId);
    try {
      const res = await fetch(api(`/shape/${encodeURIComponent(shapeId)}`));
      if (res.ok) {
        shapeCache.set(shapeId, (await res.json()).points);
        if (lastData) drawRoutes(lastData);   // redraw once it lands
      } else {
        shapeCache.set(shapeId, null);        // no geometry; stop asking
      }
    } catch {
      /* leave it unset so a later poll can retry */
    } finally {
      shapePending.delete(shapeId);
    }
  }

  // Nothing is drawn until a service is picked. Showing every route at once
  // stacked identical paths on top of each other and told you nothing; one
  // route, on demand, is what is actually useful. The same goes for the stops
  // along it — 191 grey pins for a station board was clutter, not context.
  let selectedTrip = null;

  const tripStopsCache = new Map(), tripStopsPending = new Set();

  async function ensureTripStops(tripId) {
    if (!tripId || tripStopsCache.has(tripId) || tripStopsPending.has(tripId)) return;
    tripStopsPending.add(tripId);
    try {
      const res = await fetch(api(`/trip-stops/${encodeURIComponent(tripId)}`));
      tripStopsCache.set(tripId, res.ok ? (await res.json()).stops : null);
      drawLandmarks();
    } catch {
      /* leave unset so a later selection retries */
    } finally {
      tripStopsPending.delete(tripId);
    }
  }

  // Grey landmarks: the selected route's stops (when one is traced) plus the
  // paired stops across the road from the viewed stop (always — "going the
  // other way" is the next thing a rider looks for). Never the viewed stop
  // itself; that is drawn separately in white.
  function drawLandmarks() {
    if (!mapReady || !map.getSource("landmarks")) return;
    const routeStops = (selectedTrip && tripStopsCache.get(selectedTrip)) || [];
    const paired = lastData?.paired || [];
    const selfId = lastData?.stop?.stop_id;
    const seen = new Set();
    const features = [];
    for (const l of [...routeStops, ...paired]) {
      if (l.stop_id === selfId || seen.has(l.stop_id)) continue;
      seen.add(l.stop_id);
      features.push({
        type: "Feature",
        geometry: { type: "Point", coordinates: [l.lon, l.lat] },
        properties: {
          stop_id: l.stop_id,   // click a landmark to view it as the stop
          name: l.stop_name,
          icon: ensureVehicleIcon(landmarkGlyph(l.route_type), LANDMARK_INK),
        },
      });
    }
    map.getSource("landmarks").setData({ type: "FeatureCollection", features });
  }

  // Hide only the stop being viewed from the all-stops layer — it already has
  // the white viewed-stop marker, and a grey one underneath just doubles up.
  function syncRailStationFilter() {
    if (!mapReady) return;
    if (map.getLayer("all-stops")) {
      map.setFilter("all-stops", ["!=", ["get", "stop_id"], stopId || ""]);
    }
  }

  // Every stop in the network, fetched once, lazily — only when the user first
  // zooms in far enough for the all-stops layer (minzoom 15) to matter. ~1 MB
  // of GeoJSON that most sessions never need has no place in the initial load.
  let allStopsLoaded = false, allStopsLoading = false;
  function maybeLoadAllStops() {
    if (allStopsLoaded || allStopsLoading || !mapReady) return;
    if (map.getZoom() < 14.5) return;   // fetch just ahead of the threshold
    allStopsLoading = true;
    // ?v bumped when the payload schema changes — the endpoint is cached for a
    // day (rightly: 1-2.5 MB, changes weekly), so a schema change served under
    // the same URL leaves clients on the old shape until the cache expires.
    // v2: rail stations included, tagged rt=2.
    // ?v bumped whenever the payload's meaning changes (v3: parent stations
    // inherit their children's dominant mode — ferry terminals stopped
    // reading as bus stops); the response is cached for 24 h.
    fetch(api("/all-stops?v=3"))
      .then((r) => r.json())
      .then((d) => {
        const stops = d.stops || [];
        // Near-coincident stops (a station beside its bus interchange,
        // kerbside pairs) would collide and thin each other out. Cluster by
        // true proximity — union-find over a coarse cell index, linking stops
        // within ~28 m even across cell boundaries (a plain grid hash missed
        // exactly the station-next-to-stop case) — then fan each cluster out
        // into a little row so neighbours sit next to each other instead of
        // fighting for one spot. Offsets are icon pixels (scaled by icon-size).
        const CELL = 0.0004, LINK_M = 28;
        const cells = new Map();
        stops.forEach((s, i) => {
          const key = `${Math.round(s.lat / CELL)},${Math.round(s.lon / CELL)}`;
          (cells.get(key) || cells.set(key, []).get(key)).push(i);
        });
        const root = stops.map((_, i) => i);
        const find = (i) => root[i] === i ? i : (root[i] = find(root[i]));
        const metres = (a, b) => {
          const kx = 111320 * Math.cos(a.lat * Math.PI / 180);
          return Math.hypot((a.lon - b.lon) * kx, (a.lat - b.lat) * 110540);
        };
        stops.forEach((s, i) => {
          const cy = Math.round(s.lat / CELL), cx = Math.round(s.lon / CELL);
          for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
            for (const j of cells.get(`${cy + dy},${cx + dx}`) || []) {
              if (j > i && metres(s, stops[j]) <= LINK_M) root[find(j)] = find(i);
            }
          }
        });
        const groups = new Map();
        stops.forEach((s, i) => {
          const r = find(i);
          (groups.get(r) || groups.set(r, []).get(r)).push(s);
        });
        const offsetOf = new Map();
        for (const g of groups.values()) {
          if (g.length < 2) continue;
          g.sort((a, b) => (a.route_type ?? 9) - (b.route_type ?? 9)
                        || String(a.stop_id).localeCompare(String(b.stop_id)));
          g.forEach((s, i) => {
            // rows of three, centred
            const row = Math.floor(i / 3), col = i % 3, n = Math.min(g.length - row * 3, 3);
            offsetOf.set(s.stop_id, [(col - (n - 1) / 2) * 30, row * 30]);
          });
        }
        map.getSource("all-stops").setData({
          type: "FeatureCollection",
          features: stops.map((s) => ({
            type: "Feature",
            geometry: { type: "Point", coordinates: [s.lon, s.lat] },
            properties: {
              stop_id: s.stop_id,
              name: s.name,
              rt: Number(s.route_type),
              off: offsetOf.get(s.stop_id) || [0, 0],
              icon: ensureVehicleIcon(landmarkGlyph(s.route_type), LANDMARK_INK),
            },
          })),
        });
        allStopsLoaded = true;
        syncRailStationFilter();
      })
      .catch(() => { allStopsLoading = false; });   // retry on a later zoom
  }

  function drawRoutes(data) {
    if (!mapReady || !map.getSource("routes")) return;
    if (!selectedTrip) {
      map.getSource("routes").setData(emptyFC());
      return;
    }
    const row = (data.departures || []).find((d) => d.trip_id === selectedTrip);
    const pts = row && shapeCache.get(row.shape_id);
    if (!pts) {
      if (row) ensureShape(row.shape_id);
      map.getSource("routes").setData(emptyFC());
      return;
    }
    map.getSource("routes").setData({
      type: "FeatureCollection",
      features: [{
        type: "Feature",
        geometry: { type: "LineString", coordinates: pts },
        properties: { color: (data.__colors || {})[selectedTrip] || "#3fb950" },
      }],
    });
  }

  // Clicking the same service again clears it.
  function selectRoute(tripId) {
    selectedTrip = selectedTrip === tripId ? null : tripId;
    if (selectedTrip) {
      // Start fetching now rather than waiting on the map's draw pass, so both
      // are usually cached by the time they are wanted.
      const d = (lastData?.departures || []).find((x) => x.trip_id === selectedTrip);
      if (d) ensureShape(d.shape_id);
      ensureTripStops(selectedTrip);
    }
    document.querySelectorAll(".row.selected")
      .forEach((r) => r.classList.remove("selected"));
    if (selectedTrip) {
      const el = document.querySelector(`.row[data-trip="${CSS.escape(selectedTrip)}"]`);
      if (el) el.classList.add("selected");
    }
    if (lastData) drawRoutes(lastData);
    drawLandmarks();
  }

  // MapLibre draws label text from pre-built glyph PBFs, and ours cover latin
  // only — an emoji codepoint simply would not render. So the glyph is
  // rasterised to a canvas in the vehicle's colour and registered as a map
  // image instead. One image per (glyph, colour) pair, made on demand.
  const ICON_PX = 48, ICON_RATIO = 2;

  // Canvas is fed the font through an explicitly constructed FontFace rather
  // than the stylesheet's family. Relying on the @font-face rule means relying
  // on it having been parsed and matched by the time we rasterise — and when it
  // has not been, canvas silently falls back to the system colour-emoji font
  // and bakes a full-colour glyph into the cached image. This also sidesteps
  // the rule's unicode-range, which canvas font matching need not honour.
  const CANVAS_EMOJI = "NotoEmojiCanvas";
  let emojiFontReady = null;
  function loadEmojiFont() {
    if (!emojiFontReady) {
      emojiFontReady = (async () => {
        // ?v matches fonts.css and is bumped with every subset change. This
        // bare-URL load predates the no-cache middleware, so browsers held a
        // heuristically-cached old subset — any glyph added since (🚉) then
        // fell back to the system COLOUR emoji font on the canvas, which is
        // exactly the coloured-map-icons bug. A new URL is a guaranteed miss.
        const ff = new FontFace(CANVAS_EMOJI,
          "url('/static/fonts/NotoEmoji-mode.woff2?v=5')");
        await ff.load();
        document.fonts.add(ff);
      })().catch(() => { /* fall back to whatever canvas picks */ });
    }
    return emojiFontReady;
  }

  function ensureVehicleIcon(glyph, color) {
    const id = `veh-${glyph.codePointAt(0).toString(16)}-${color.replace("#", "")}`;
    if (map.hasImage(id)) return id;

    const c = document.createElement("canvas");
    c.width = c.height = ICON_PX;
    const ctx = c.getContext("2d");
    ctx.font = `${Math.round(ICON_PX * 0.7)}px "${CANVAS_EMOJI}", sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    // Dark outline first so the glyph stays legible over any basemap colour.
    ctx.lineJoin = "round";
    ctx.lineWidth = ICON_PX * 0.14;
    ctx.strokeStyle = "#0c1013";
    ctx.strokeText(glyph, ICON_PX / 2, ICON_PX / 2);
    ctx.fillStyle = color;
    ctx.fillText(glyph, ICON_PX / 2, ICON_PX / 2);

    map.addImage(id, ctx.getImageData(0, 0, ICON_PX, ICON_PX), {
      pixelRatio: ICON_RATIO,
    });
    return id;
  }

  // A filter that matches no feature — the ping ring's resting state.
  const PING_OFF = ["==", ["get", "trip"], "␀none"];
  const REDUCED_MOTION = window.matchMedia("(prefers-reduced-motion: reduce)");

  const FIT_PADDING = 46;   // keeps markers clear of the edges and the controls
  const FIT_MAX_ZOOM = 15;  // stop it diving in when everything is close together

  // --- linking the two views ---------------------------------------------
  let pingRaf = null, pingTimer = null;

  // Board row -> map. Expanding ring on that marker, panning to it first if it
  // has drifted out of view. Works for a live vehicle or an estimated ghost —
  // whichever holds the trip — pinging on that source's own ring layer.
  function pingVehicle(tripId) {
    if (!mapReady || !map.getLayer("vehicle-ping")) return;
    let target = (lastData?.__vehicles || []).find((x) => x.trip_id === tripId);
    let layer = "vehicle-ping";
    if (!target) {
      target = (lastData?.__ghosts || []).find((x) => x.trip_id === tripId);
      layer = "ghost-ping";
    }
    if (!target) return;

    if (!map.getBounds().contains([target.lon, target.lat])) {
      cameraMove(() => map.easeTo({ center: [target.lon, target.lat], duration: 600 }));
    }

    cancelAnimationFrame(pingRaf);
    clearTimeout(pingTimer);
    // Only one ping at a time, on either layer.
    map.setFilter("vehicle-ping", PING_OFF);
    map.setFilter("ghost-ping", PING_OFF);
    map.setFilter(layer, ["==", ["get", "trip"], tripId]);

    if (REDUCED_MOTION.matches) {
      // Static ring instead of a pulse, then clear.
      map.setPaintProperty(layer, "circle-radius", 20);
      map.setPaintProperty(layer, "circle-opacity", 0.3);
      map.setPaintProperty(layer, "circle-stroke-opacity", 0.9);
      pingTimer = setTimeout(() => map.setFilter(layer, PING_OFF), 1600);
      return;
    }

    const START = performance.now(), CYCLE = 850, TOTAL = 2550;
    const step = (t) => {
      const elapsed = t - START;
      if (elapsed > TOTAL) {
        map.setFilter(layer, PING_OFF);
        return;
      }
      const p = (elapsed % CYCLE) / CYCLE;      // 0..1 within each pulse
      map.setPaintProperty(layer, "circle-radius", 9 + p * 26);
      map.setPaintProperty(layer, "circle-opacity", 0.32 * (1 - p));
      map.setPaintProperty(layer, "circle-stroke-opacity", 0.95 * (1 - p));
      pingRaf = requestAnimationFrame(step);
    };
    pingRaf = requestAnimationFrame(step);
  }

  // --- disruption alerts ---------------------------------------------------
  // Alert text comes from the feed, so the popup is built with DOM APIs — never
  // innerHTML — to keep any markup in the text inert.
  function showAlerts(ids) {
    const map = lastData?.alerts || {};
    const box = $("alert-box");
    box.innerHTML = "";
    const h = document.createElement("h2");
    const g = document.createElement("span");
    g.className = "glyph";
    g.textContent = asText(MARK_ALERT);
    h.append(g, " Service disruptions");
    box.appendChild(h);
    ids.forEach((i) => {
      const a = map[String(i)];
      if (!a) return;
      const item = document.createElement("div");
      item.className = "alert-item";
      const eff = document.createElement("div");
      eff.className = "effect";
      eff.textContent = a.effect || "";
      const head = document.createElement("div");
      head.className = "head";
      head.textContent = a.header || "";
      const body = document.createElement("div");
      body.className = "body";
      body.textContent = a.description || "";
      item.append(eff, head, body);
      box.appendChild(item);
    });
    const close = document.createElement("button");
    close.className = "alert-close";
    close.textContent = "Close";
    close.onclick = closeAlerts;
    box.appendChild(close);
    $("alert-modal").hidden = false;
    close.focus();
  }

  function closeAlerts() { $("alert-modal").hidden = true; }

  $("alert-modal").addEventListener("click", (e) => {
    if (e.target === $("alert-modal")) closeAlerts();   // backdrop only
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && !$("alert-modal").hidden) closeAlerts();
  });

  // Map -> board row. Flash the matching row and bring it into view.
  let flashTimer = null;
  function flashRow(tripId) {
    const row = document.querySelector(`.row[data-trip="${CSS.escape(tripId)}"]`);
    if (!row) return;
    clearTimeout(flashTimer);
    document.querySelectorAll(".row.flash").forEach((r) => r.classList.remove("flash"));
    void row.offsetWidth;             // restart the animation if it is re-clicked
    row.classList.add("flash");
    row.scrollIntoView({ block: "nearest", behavior: "smooth" });
    flashTimer = setTimeout(() => row.classList.remove("flash"), 2200);
  }

  // Move the camera under our own flag, so the movestart handler does not read
  // it as the user taking over.
  function cameraMove(fn) {
    programmatic = true;
    fn();
  }

  // Frame the stop and every marker — live and estimated alike, since the point
  // is that the board and the map show the same set. Called on each poll, but
  // only actually moves when it needs to: re-animating a map every 15 seconds
  // while someone is reading it is worse than a slightly stale frame.
  function fitView(data, vehicles, ghosts = []) {
    if (!mapReady || (!autoFit && !forceFit)) return;

    const pts = [];
    const { stop_lat: lat, stop_lon: lon } = data.stop;
    if (lat != null && lon != null) pts.push([lon, lat]);
    vehicles.forEach((v) => pts.push([v.lon, v.lat]));
    ghosts.forEach((g) => pts.push([g.lon, g.lat]));
    if (!pts.length) return;

    if (pts.length === 1) {
      if (forceFit) {
        cameraMove(() => map.easeTo({ center: pts[0], zoom: 14, duration: 600 }));
        forceFit = false;
      }
      return;
    }

    const bounds = pts.reduce(
      (b, p) => b.extend(p),
      new maplibregl.LngLatBounds(pts[0], pts[0]),
    );

    if (!forceFit) {
      // Already framed well enough? Leave it alone. Refit when something has
      // moved out of view, or when the view has drifted much wider than needed
      // (a distant vehicle dropping off the board zooms us back in).
      const view = map.getBounds();
      const allVisible = pts.every((p) => view.contains(p));
      const target = map.cameraForBounds(bounds, {
        padding: FIT_PADDING, maxZoom: FIT_MAX_ZOOM,
      });
      const tooWide = target && target.zoom - map.getZoom() > 1.5;
      if (allVisible && !tooWide) return;
    }

    cameraMove(() => map.fitBounds(bounds, {
      padding: FIT_PADDING, maxZoom: FIT_MAX_ZOOM, duration: 700,
    }));
    forceFit = false;
  }

  function updateMap(data) {
    if (!mapReady) return;
    const lat = data.stop.stop_lat, lon = data.stop.stop_lon;

    if (lat != null && lon != null) {
      map.getSource("stop").setData({
        type: "FeatureCollection",
        features: [{
          type: "Feature",
          geometry: { type: "Point", coordinates: [lon, lat] },
          // White: this is the landmark that was searched for.
          properties: {
            icon: ensureVehicleIcon(stopGlyph(data), LANDMARK_SELECTED_INK),
          },
        }],
      });
    }

    drawLandmarks();

    const now = Math.floor(Date.now() / 1000);
    const colors = data.__colors || {};
    // __vehicles is the set trimmed to the rows actually on screen.
    const vehicles = data.__vehicles || data.vehicles || [];
    // route_type rides on the departures, not the vehicles, so look it up.
    const modeOf = {};
    data.departures.forEach((d) => { modeOf[d.trip_id] = d.route_type; });

    map.getSource("vehicles").setData({
      type: "FeatureCollection",
      features: vehicles.map((v) => {
        const color = colors[v.trip_id] || "#3fb950";
        const glyph = MODE_EMOJI[modeOf[v.trip_id]] ?? DEFAULT_EMOJI;
        return {
          type: "Feature",
          geometry: { type: "Point", coordinates: [v.lon, v.lat] },
          properties: {
            trip: v.trip_id,          // links the marker back to its board row
            route: v.route ?? "",
            headsign: v.headsign ?? "",
            minutes: v.minutes,
            color,
            icon: ensureVehicleIcon(glyph, color),
            age: v.timestamp ? now - v.timestamp : null,
          },
        };
      }),
    });

    // Ghosts: same icon and colour as the live dots so the pairing to a row is
    // identical, but the layers render them faded and ringed.
    const ghosts = data.__ghosts || data.ghosts || [];
    map.getSource("ghosts").setData({
      type: "FeatureCollection",
      features: ghosts.map((g) => {
        const color = colors[g.trip_id] || "#3fb950";
        const glyph = MODE_EMOJI[modeOf[g.trip_id]] ?? DEFAULT_EMOJI;
        return {
          type: "Feature",
          geometry: { type: "Point", coordinates: [g.lon, g.lat] },
          properties: {
            trip: g.trip_id,
            route: g.route ?? "",
            headsign: g.headsign ?? "",
            minutes: g.minutes,
            color,
            icon: ensureVehicleIcon(glyph, color),
          },
        };
      }),
    });

    drawRoutes(data);
    fitView(data, vehicles, ghosts);

    const shownCount = data.departures.length - (data.__hidden || 0);
    const live = vehicles.length, est = ghosts.length;
    $("map-status").textContent =
      live + est === 0 ? "no positions for these services"
      : est === 0 ? `${live} of ${shownCount} tracking live`
      : `${live} live · ${est} estimated`;
  }

  // --- departures board --------------------------------------------------
  let lastData = null;

  // How many rows fit between the top of the board and the bottom of the
  // viewport. Null until a row has been measured — the first render draws
  // everything, measures, then redraws trimmed.
  let rowHeight = null;

  function fittingRowCount() {
    if (!rowHeight) return null;
    const top = $("board").getBoundingClientRect().top;
    const avail = window.innerHeight - top - BOARD_BOTTOM_GUTTER;
    return Math.max(1, Math.floor(avail / rowHeight));
  }
  const BOARD_BOTTOM_GUTTER = 28;   // breathing room + the status line

  function renderBoard(data) {
    $("stop-name").textContent = data.stop.stop_name;
    const board = $("board");
    board.innerHTML = "";
    if (data.departures.length === 0) {
      board.innerHTML = `<div class="empty">No services in the next 90 minutes.</div>`;
    }

    // Show only what fits, and cut the map to match: a marker with no row on
    // screen is exactly the mismatch the vehicles array exists to prevent.
    const limit = fittingRowCount();
    const shown = limit ? data.departures.slice(0, limit) : data.departures;
    const shownIds = new Set(shown.map((d) => d.trip_id));
    const vehicles = (data.vehicles || []).filter((v) => shownIds.has(v.trip_id));
    const ghosts = (data.ghosts || []).filter((g) => shownIds.has(g.trip_id));

    // One colour per departure, shared by the row and — where the service has
    // a live position — its map marker.
    const colors = assignColors(shown);
    const trackedTrips = new Set(vehicles.map((v) => v.trip_id));
    const ghostTrips = new Set(ghosts.map((g) => g.trip_id));
    data.__colors = colors;
    data.__vehicles = vehicles;
    data.__ghosts = ghosts;
    data.__hidden = data.departures.length - shown.length;

      const MODES = { 0: "Tram", 1: "Metro", 2: "Train", 3: "Bus", 4: "Ferry" };
      shown.forEach((d) => {
        const row = document.createElement("div");
        const vcolor = colors[d.trip_id];
        const isTracked = trackedTrips.has(d.trip_id);
        const isGhost = ghostTrips.has(d.trip_id);
        // Every row can show its route; a live or estimated one has a marker to
        // ping. (isTracked is kept as its own class for possible styling.)
        row.className = "row" + (isTracked ? " tracked" : "") + (isGhost ? " ghost" : "");
        if (d.trip_id === selectedTrip) row.classList.add("selected");
        row.dataset.trip = d.trip_id;
        row.style.setProperty("--vcolor", vcolor);
        row.tabIndex = 0;
        const activate = () => {
          selectRoute(d.trip_id);
          if ((isTracked || isGhost) && selectedTrip) pingVehicle(d.trip_id);
        };
        row.addEventListener("click", activate);
        row.addEventListener("keydown", (ev) => {
          if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); activate(); }
        });
        // The badge plate stays black; the glyph and number take the service's
        // colour, matching the row stripe and, when tracked, the map marker.
        const badgeStyle = `style="color:${vcolor}"`;
        const routeLabel = d.route ?? "";
        const numClass = routeLabel.length > 8 ? "num xwide"
                       : routeLabel.length > 4 ? "num wide" : "num";
        const glyph = MODE_EMOJI[d.route_type] ?? DEFAULT_EMOJI;
        const eta = d.minutes <= 0
          ? `<div class="due">DUE</div>`
          : `<div class="num">${d.minutes}</div><div class="unit">MIN</div>`;
        const bits = [MODES[d.route_type] ?? ""];
        if (d.platform) bits.push(`Platform ${d.platform}`);
        bits.push(new Date(d.predicted * 1000)
          .toLocaleTimeString([], {hour: "2-digit", minute: "2-digit",
                                   ...(regionTz ? {timeZone: regionTz} : {})}));
        row.innerHTML = `
          <div class="badge" ${badgeStyle}>
            <span class="mode">${asText(glyph)}</span>
            <span class="${numClass}">${routeLabel}</span>
          </div>
          <div class="dest">
            <div class="headsign">${d.headsign ?? ""}</div>
            <div class="sub">${bits.filter(Boolean).join(" · ")}</div>
          </div>
          <div class="src-col">
            <span title="${d.realtime ? "Live Location Feed" : "Scheduled/Estimated"}"
                  >${asText(d.realtime ? MARK_LIVE : MARK_SCHEDULED)}</span>
            ${d.alert_ids && d.alert_ids.length
              ? `<button class="alert-mark" title="Service disruption — click for details"
                         aria-label="Service disruption details">${asText(MARK_ALERT)}</button>`
              : ""}
          </div>
          <div class="eta">${eta}</div>`;
        // The ⚠ opens the disruption popup; it must not also select the row.
        const am = row.querySelector(".alert-mark");
        if (am) am.addEventListener("click", (ev) => {
          ev.stopPropagation();
          showAlerts(d.alert_ids);
        });
        board.appendChild(row);
      });

    // Measure once from a real row, then redraw now that the count is known.
    if (!rowHeight) {
      const first = board.querySelector(".row");
      if (first) {
        rowHeight = first.getBoundingClientRect().height;
        renderBoard(data);
        return;
      }
    }

    const age = data.realtime_feed_age;
    const feed = age === null
      ? "realtime feed: waiting for first fetch"
      : `realtime feed updated ${age}s ago`;
    $("status").textContent = data.__hidden > 0
      ? `${feed} · ${data.__hidden} more not shown`
      : feed;
  }

  async function refresh() {
    if (!stopId) return;
    try {
      const res = await fetch(api(`/departures/${stopId}`));
      if (!res.ok) throw new Error((await res.json()).detail || res.status);
      const data = await res.json();
      renderBoard(data);
      lastData = data;
      updateMap(data);
    } catch (err) {
      $("board").innerHTML = `<div class="error">${err.message}</div>`;
    }
  }

  // Re-fit the board when the viewport changes; the row count is derived from
  // available height, so a resize or an orientation change alters it.
  let resizeDebounce;
  window.addEventListener("resize", () => {
    clearTimeout(resizeDebounce);
    resizeDebounce = setTimeout(() => {
      fitResults();
      if (!lastData) return;
      renderBoard(lastData);
      updateMap(lastData);
    }, 150);
  });

  syncChrome();
  initMap();
  if (stopId) selectStop(stopId);
  // ?q= deep-links a search: prefill the box and run it as if typed.
  const preQ = new URLSearchParams(location.search).get("q");
  if (preQ && !stopId) {
    const inp = $("search");
    inp.value = preQ;
    inp.dispatchEvent(new Event("input", { bubbles: true }));
  }
</script>
</body>
</html>
